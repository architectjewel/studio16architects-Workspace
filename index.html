    const STATUS_TONE = { live:"bg-emerald-50 text-emerald-600", hold:"bg-amber-50 text-amber-600", dead:"bg-zinc-100 text-zinc-400", complete:"bg-blue-50 text-blue-600", closed:"bg-zinc-100 text-zinc-500" };

    /* ===== small components ===== */
    function Select({value,onChange,options,className,tone}){
      return <select value={value} onChange={e=>onChange(e.target.value)} className={`mono rounded-md border px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900 ${tone||"border-zinc-300 text-zinc-700 bg-white"} ${className||""}`}>{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>;
    }
    function TypeSelect({value,onChange,wt}){ const groups = wt==="production"?PROD_GROUPS:FOLLOW_GROUPS; return <select value={value} onChange={e=>onChange(e.target.value)} className="mono w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900">{groups.map(g=><optgroup key={g.g} label={g.g}>{g.items.map(([n,,code])=><option key={n} value={n}>{n}{code?` (${code})`:""}</option>)}</optgroup>)}<option value="__custom">✏ Custom task…</option></select>; }
    function Reorder({onUp,onDown,upOk,downOk}){ return <span className="flex flex-col leading-none"><button onClick={e=>{e.stopPropagation();upOk&&onUp();}} disabled={!upOk} className="px-1 text-[9px] text-zinc-400 hover:text-zinc-800 disabled:opacity-20">▲</button><button onClick={e=>{e.stopPropagation();downOk&&onDown();}} disabled={!downOk} className="px-1 text-[9px] text-zinc-400 hover:text-zinc-800 disabled:opacity-20">▼</button></span>; }
    function RoleField({value,onChange}){ const inList=ROLES.includes(value); const [custom,setCustom]=useState(!inList&&!!value); const showCustom=custom||(!inList&&!!value); return <><Select value={showCustom?"__custom":(inList?value:"")} onChange={v=>{ if(v==="__custom"){setCustom(true);onChange("");} else {setCustom(false);onChange(v);} }} className="w-full" options={[{value:"",label:"Select role…"},...ROLES.map(r=>({value:r,label:r})),{value:"__custom",label:"✏ Custom role…"}]} />{showCustom&&<input autoFocus value={value} onChange={e=>onChange(e.target.value)} placeholder="Type role…" className="mt-1 w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" />}</>; }
    const Lbl = ({children})=> <label className="mono mb-1 block text-[9px] uppercase tracking-wider text-zinc-400">{children}</label>;
    const Input = (p)=> <input {...p} className={`w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900 ${p.className||""}`} />;
    const Dot = ({level})=> <span className={`h-2 w-2 rounded-full ${PRIORITY[level].dot}`} />;
    const Avatar = ({name})=> <span className="mono flex h-7 w-7 items-center justify-center rounded-full bg-zinc-800 text-[10px] font-semibold text-white">{name?initials(name):"—"}</span>;
    const Stat = ({n,l,tone})=> <div className="flex flex-col"><span className={`mono text-base font-semibold leading-none ${tone==="red"?"text-red-500":"text-zinc-900"}`}>{n}</span><span className="mono mt-1 text-[9px] uppercase tracking-wider text-zinc-400">{l}</span></div>;

    /* ===== mappers (db row -> app shape) ===== */
    const mapMember = r=>({id:r.id,name:r.name,role:r.role,teamId:r.team_id,boardId:r.board_id,status:r.status,archivedDate:r.archived_date,sort:r.sort_order});
    const mapBoard = r=>({id:r.id,name:r.name,desc:r.description||"",leadId:r.lead_member_id,sort:r.sort_order});
    const mapProject = r=>({id:r.id,code:r.code,nickname:r.nickname,client:r.client,location:r.location,size:r.size,address:r.address,priority:r.priority,status:r.status,lead:r.lead_member_id,sort:r.sort_order,tasks:[]});
    const mapTask = r=>({id:r.id,projectId:r.project_id,label:r.label,workType:r.work_type,cat:r.cat,code:r.code,status:r.status,assignee:r.assignee_member_id,contact:r.contact||"",doneDate:r.done_date,sort:r.sort_order});

    function App(){
      const [session,setSession]=useState(null);
      const [profile,setProfile]=useState(null);
      const [members,setMembers]=useState([]);
      const [boards,setBoards]=useState([]);
      const [projects,setProjects]=useState([]);
      const [loading,setLoading]=useState(false);
      const [err,setErr]=useState("");
      const [email,setEmail]=useState(""); const [pw,setPw]=useState(""); const [busy,setBusy]=useState(false);
      const [selId,setSelId]=useState("");
      const [activeBoard,setActiveBoard]=useState("");
      const [wt,setWt]=useState("all");
      const [expanded,setExpanded]=useState(null);
      const [shareOpen,setShareOpen]=useState(false); const [copied,setCopied]=useState(false);
      const [showAddM,setShowAddM]=useState(false); const [nm,setNm]=useState({name:"",role:"Architect",teamId:""});
      const [editM,setEditM]=useState(null);
      const [removeM,setRemoveM]=useState(false); const [reassign,setReassign]=useState("");
      const [boardCfg,setBoardCfg]=useState(false); const [addBoardOpen,setAddBoardOpen]=useState(false); const [nb,setNb]=useState({name:"",desc:"",leadId:""});
      const [showAddP,setShowAddP]=useState(false); const [np,setNp]=useState({raw:"",code:"",nickname:"",client:"",location:"",size:"",address:"",priority:"medium",status:"live",lead:"__none"});
      const [addTaskFor,setAddTaskFor]=useState(null); const [td,setTd]=useState({workType:"production",type:PROD_GROUPS[0].items[0][0],label:"",contact:"",assignee:"__none"});
      const [tab,setTab]=useState("team"); const [q,setQ]=useState(""); const [regStatus,setRegStatus]=useState("all"); const [editP,setEditP]=useState(null); const [delP,setDelP]=useState(null); const [showRegAdd,setShowRegAdd]=useState(false); const [showBoardShare,setShowBoardShare]=useState(false); const [boardCopied,setBoardCopied]=useState(false); const [subOpen,setSubOpen]=useState({});

      const isAdmin = profile?.role==="admin";

      useEffect(()=>{ if(!db) return; db.auth.getSession().then(({data})=>setSession(data.session)); const {data:sub}=db.auth.onAuthStateChange((_e,s)=>setSession(s)); return ()=>sub.subscription.unsubscribe(); },[]);
      useEffect(()=>{ if(session) load(true); },[session]);

      async function load(initial){
        if(initial) setLoading(true); setErr("");
        try{
          let prof = profile;
          if(initial){ const {data:p,error:pe}=await db.from("profiles").select("*, companies(*)").eq("id",session.user.id).single(); if(pe) throw pe; prof=p; setProfile(p); }
          const [mb,bd,pr,tk]=await Promise.all([
            db.from("members").select("*").order("sort_order"),
            db.from("boards").select("*").order("sort_order"),
            db.from("projects").select("*").order("sort_order"),
            db.from("tasks").select("*").order("sort_order"),
          ]);
          for(const r of [mb,bd,pr,tk]) if(r.error) throw r.error;
          let bds = bd.data.map(mapBoard);
          if(bds.length===0 && prof?.role==="admin"){ const {data:nbd}=await db.from("boards").insert({company_id:prof.company_id,name:"Design Team",description:"",sort_order:0}).select().single(); if(nbd) bds=[mapBoard(nbd)]; }
          const tasks = tk.data.map(mapTask);
          const projs = pr.data.map(mapProject).map(p=>({...p,tasks:tasks.filter(t=>t.projectId===p.id).sort((a,b)=>a.sort-b.sort)}));
          setMembers(mb.data.map(mapMember)); setBoards(bds); setProjects(projs);
          setActiveBoard(a=> a && bds.some(b=>b.id===a) ? a : (bds[0]?.id||""));
        }catch(e){ setErr(e.message||String(e)); }
        if(initial) setLoading(false);
      }
      const refresh = ()=>load(false);
      const cid = ()=>profile.company_id;
      const fail = (e)=>{ if(e){ setErr(e.message||String(e)); return true; } return false; };

      async function signIn(e){ e.preventDefault(); setBusy(true); setErr(""); const {error}=await db.auth.signInWithPassword({email:email.trim(),password:pw}); if(error) setErr(error.message); setBusy(false); }
      async function signOut(){ await db.auth.signOut(); setSession(null); setProfile(null); setMembers([]); setBoards([]); setProjects([]); }

      const byId = id=>members.find(m=>m.id===id);
      const active = members.filter(m=>m.status==="active");
      const archived = members.filter(m=>m.status==="archived");
      const boardOf = m=> m.boardId || boards[0]?.id;
      const boardMembers = active.filter(m=> boardOf(m)===activeBoard).sort((a,b)=>a.sort-b.sort);
      const activeLead = (()=>{ const lid=boards.find(b=>b.id===activeBoard)?.leadId; return lid && boardMembers.some(m=>m.id===lid) ? lid : null; })();
      const sel = byId(selId);
      const mine = projects.filter(p=> p.lead===selId || p.tasks.some(t=>t.assignee===selId));
      const matchWt = p=> wt==="all" || p.tasks.some(t=>t.workType===wt);
      const kpis = {
        live: projects.filter(p=>p.status==="live").length,
        ongoing: projects.filter(p=>p.status==="live"&&p.tasks.some(t=>t.status==="ongoing")).length,
        hold: projects.filter(p=>p.status==="hold").length,
        unassigned: projects.filter(p=>p.status==="live"&&!p.lead).length,
        pending: projects.filter(p=>p.status==="live").reduce((a,p)=>a+p.tasks.filter(t=>t.workType==="coordination"&&t.status==="pending").length,0),
      };

      async function addMember(){ if(!nm.name.trim()) return; if(fail((await db.from("members").insert({company_id:cid(),board_id:activeBoard,name:nm.name.trim(),role:(nm.role||"Team member").trim(),team_id:nm.teamId.trim()||null,status:"active",sort_order:boardMembers.length})).error)) return; setNm({name:"",role:"Architect",teamId:""}); setShowAddM(false); await refresh(); }
      async function saveMember(){ const e=editM; if(fail((await db.from("members").update({name:e.name.trim()||sel.name,role:e.role.trim()||sel.role,team_id:e.teamId.trim()||null,board_id:e.boardId||boardOf(sel)}).eq("id",selId)).error)) return; setEditM(null); if(e.boardId&&e.boardId!==activeBoard) setSelId(""); await refresh(); }
      async function moveMember(id,dir){ const i=boardMembers.findIndex(m=>m.id===id); const j=i+dir; if(j<0||j>=boardMembers.length) return; const a=boardMembers[i],b=boardMembers[j]; await db.from("members").update({sort_order:b.sort}).eq("id",a.id); await db.from("members").update({sort_order:a.sort}).eq("id",b.id); await refresh(); }
      async function doRemoveMember(){ const id=selId; const doneN=projects.reduce((a,p)=>a+p.tasks.filter(t=>t.assignee===id&&t.status==="done").length,0); const to=reassign||null; await db.from("tasks").update({assignee_member_id:to}).eq("assignee_member_id",id).neq("status","done"); await db.from("projects").update({lead_member_id:to}).eq("lead_member_id",id); await db.from("boards").update({lead_member_id:to}).eq("lead_member_id",id); if(doneN>0) await db.from("members").update({status:"archived",archived_date:today()}).eq("id",id); else await db.from("members").delete().eq("id",id); setRemoveM(false); setReassign(""); setSelId(""); await refresh(); }
      async function restore(id){ await db.from("members").update({status:"active"}).eq("id",id); await refresh(); }

      async function addBoard(){ if(!nb.name.trim()) return; const {data,error}=await db.from("boards").insert({company_id:cid(),name:nb.name.trim(),description:nb.desc.trim(),lead_member_id:nb.leadId||null,sort_order:boards.length}).select().single(); if(fail(error)) return; setNb({name:"",desc:"",leadId:""}); setAddBoardOpen(false); await refresh(); setActiveBoard(data.id); setSelId(""); }
      async function patchBoard(id,f){ if(fail((await db.from("boards").update(f).eq("id",id)).error)) return; await refresh(); }
      async function removeBoard(id){ if(boards.length<=1) return; const fb=boards.find(b=>b.id!==id).id; await db.from("members").update({board_id:fb}).eq("board_id",id); await db.from("boards").delete().eq("id",id); setBoardCfg(false); setActiveBoard(fb); setSelId(""); await refresh(); }
      async function moveBoard(id,dir){ const i=boards.findIndex(b=>b.id===id); const j=i+dir; if(j<0||j>=boards.length) return; const a=boards[i],b=boards[j]; await db.from("boards").update({sort_order:b.sort}).eq("id",a.id); await db.from("boards").update({sort_order:a.sort}).eq("id",b.id); await refresh(); }

      async function addProject(){ if(!np.code.trim()||!np.client.trim()) return; const lead=np.lead==="__none"?null:np.lead; const {data:proj,error}=await db.from("projects").insert({company_id:cid(),code:np.code.trim(),nickname:np.nickname,client:np.client,location:np.location,size:np.size,address:np.address,priority:np.priority,status:np.status||"live",lead_member_id:lead,sort_order:projects.length}).select().single(); if(fail(error)) return; const tasks=DEFAULT_TASK_DEFS.map(([name,w],i)=>({project_id:proj.id,label:name,work_type:w,cat:typeCat(name,w),code:typeCode(name,w),status:ONGOING_DEFAULTS.includes(name)?"ongoing":"upcoming",assignee_member_id:lead,contact:"",sort_order:i})); if(fail((await db.from("tasks").insert(tasks)).error)) return; setNp({raw:"",code:"",nickname:"",client:"",location:"",size:"",address:"",priority:"medium",status:"live",lead:"__none"}); setShowAddP(false); setShowRegAdd(false); await refresh(); setExpanded(proj.id); }
      async function moveProject(list,id,dir){ const i=list.findIndex(p=>p.id===id); const j=i+dir; if(j<0||j>=list.length) return; const a=list[i],b=list[j]; await db.from("projects").update({sort_order:b.sort}).eq("id",a.id); await db.from("projects").update({sort_order:a.sort}).eq("id",b.id); await refresh(); }
      async function saveEditP(){ const e=editP; const f={code:e.code.trim(),nickname:e.nickname,client:e.client,location:e.location,size:e.size,address:e.address,priority:e.priority,status:e.status,lead_member_id:e.lead==="__none"?null:e.lead}; if(fail((await db.from("projects").update(f).eq("id",e.id)).error)) return; if(f.lead_member_id) await db.from("tasks").update({assignee_member_id:f.lead_member_id}).eq("project_id",e.id).is("assignee_member_id",null); setEditP(null); await refresh(); }
      async function deleteProject(id){ await db.from("tasks").delete().eq("project_id",id); if(fail((await db.from("projects").delete().eq("id",id)).error)) return; setDelP(null); if(expanded===id) setExpanded(null); await refresh(); }

      async function addTask(pid){ const sort=(projects.find(p=>p.id===pid)?.tasks.length)||0; const isC=td.type==="__custom"; const label=isC?(td.label.trim()||"Custom task"):td.type; const cat=isC?"CUSTOM":typeCat(td.type,td.workType); const code=isC?"":typeCode(td.type,td.workType); if(fail((await db.from("tasks").insert({project_id:pid,label,work_type:td.workType,cat,code,status:"upcoming",assignee_member_id:td.assignee==="__none"?null:td.assignee,contact:td.contact||"",sort_order:sort})).error)) return; setTd({workType:"production",type:PROD_GROUPS[0].items[0][0],label:"",contact:"",assignee:selId||"__none"}); setAddTaskFor(null); await refresh(); }

      async function moveTask(list,id,dir){ const i=list.findIndex(t=>t.id===id); const j=i+dir; if(j<0||j>=list.length) return; const a=list[i],b=list[j]; await db.from("tasks").update({sort_order:b.sort}).eq("id",a.id); await db.from("tasks").update({sort_order:a.sort}).eq("id",b.id); await refresh(); }

      function buildShare(m){ if(!m) return ""; const mp=projects.filter(p=>p.tasks.some(t=>t.assignee===m.id&&t.status!=="done")).sort((a,b)=>PRIORITY[a.priority].rank-PRIORITY[b.priority].rank); const out=[m.name]; mp.forEach((p,pi)=>{ out.push((pi+1)+". "+p.code+" "+(p.nickname||p.client||"")); p.tasks.filter(t=>t.assignee===m.id&&t.status!=="done").forEach((t,ti)=>{ const L=String.fromCharCode(65+ti); const c=t.workType==="coordination"&&t.contact?" -> "+t.contact:""; const tag=t.workType==="coordination"?"(follow-up "+t.status+")":"("+t.status+")"; out.push("     "+L+". "+t.label+c+" "+tag); }); }); if(!mp.length) out.push("No open tasks."); return out.join("\n"); }
      function doCopy(){ const text=buildShare(sel); if(navigator.clipboard) navigator.clipboard.writeText(text).catch(()=>{}); const ta=document.getElementById("shareArea"); if(ta){ta.focus();ta.select();try{document.execCommand("copy");}catch(e){}} setCopied(true); setTimeout(()=>setCopied(false),1500); }

      function buildBoardShare(){ const live=projects.filter(p=>p.status==="live"); const out=[(profile?.companies?.name||"Studio 16")+" — Live Projects ("+today()+")"]; ["top","medium","low"].forEach(lvl=>{ const rows=live.filter(p=>p.priority===lvl).sort((a,b)=>a.sort-b.sort); if(!rows.length) return; out.push(""); out.push("● "+PRIORITY[lvl].label.toUpperCase()+" PRIORITY"); rows.forEach((p,i)=>{ const lead=byId(p.lead); out.push((i+1)+". "+p.code+" "+(p.nickname||p.client||"")+(lead?" — "+lead.name:" — (no lead)")); const ts=p.tasks.filter(t=>t.status!=="done").sort((a,b)=>a.sort-b.sort); if(!ts.length){ out.push("     (no open tasks)"); } else { ts.forEach(t=>{ const who=byId(t.assignee); const c=t.workType==="coordination"&&t.contact?" -> "+t.contact:""; const mark=t.status==="ongoing"?"►":t.status==="pending"?"!":"·"; out.push("     "+mark+" "+t.label+c+" ("+t.status+(who?", "+who.name.split(" ")[0]:"")+")"); }); } }); }); if(out.length===1) out.push("No live projects."); return out.join("\n"); }
      function copyBoard(){ copyText(buildBoardShare()); setBoardCopied(true); setTimeout(()=>setBoardCopied(false),1500); }
      function printBoard(){ const c=profile?.companies||{}; const live=projects.filter(p=>p.status==="live"); const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); const taskLine=t=>{ const who=byId(t.assignee); const c2=t.workType==="coordination"&&t.contact?" → "+esc(t.contact):""; return "<div class='tk "+t.status+"'><span class='dot "+t.workType+"'></span><span class='tl'>"+esc(t.label)+c2+"</span><span class='ts'>"+t.status+(who?" · "+esc(who.name.split(' ')[0]):"")+"</span></div>"; }; const taskBlock=p=>{ const open=p.tasks.filter(t=>t.status!=="done").sort((a,b)=>a.sort-b.sort); const prod=open.filter(t=>t.workType==="production"); const fol=open.filter(t=>t.workType==="coordination"); if(!open.length) return "<div class='none'>No open tasks</div>"; let h=""; if(prod.length) h+="<div class='grp'>Production</div>"+prod.map(taskLine).join(""); if(fol.length) h+="<div class='grp'>Follow-up</div>"+fol.map(taskLine).join(""); return h; }; const sec=["top","medium","low"].map(lvl=>{ const rows=live.filter(p=>p.priority===lvl).sort((a,b)=>a.sort-b.sort); if(!rows.length) return ""; const blocks=rows.map((p,i)=>{ const lead=byId(p.lead); return "<div class='pj'><div class='ph'><span class='pc'>"+esc(p.code)+"</span><span class='pn'>"+esc(p.nickname||p.client||"")+"</span><span class='pl'>"+(lead?esc(lead.name):"<span class=u>Unassigned</span>")+"</span></div>"+taskBlock(p)+"</div>"; }).join(""); return "<h2 class='"+lvl+"'>"+PRIORITY[lvl].label+" priority <span>"+rows.length+"</span></h2>"+blocks; }).join(""); const html="<!doctype html><html><head><meta charset='utf-8'><title>Live Projects — "+esc(c.name||"Studio 16")+"</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Archivo,Arial,sans-serif;color:#18181b;padding:38px 44px}.hd{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:2px solid #18181b;padding-bottom:14px}.hd img{height:42px}.hd .co{text-align:right;font-size:10px;color:#52525b;line-height:1.5}.ttl{margin:22px 0 4px;font-size:19px;font-weight:700}.sub{font-size:11px;color:#71717a;margin-bottom:14px}h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px;color:#18181b}h2 span{color:#a1a1aa;font-weight:500;margin-left:4px}h2.top{color:#dc2626}h2.medium{color:#d97706}.pj{border:1px solid #e4e4e7;border-radius:7px;padding:9px 11px;margin-bottom:8px;page-break-inside:avoid}.ph{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}.pc{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:13px}.pn{font-size:13px;flex:1}.pl{font-size:10px;color:#71717a}.grp{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#a1a1aa;margin:5px 0 2px}.tk{display:flex;align-items:center;gap:6px;font-size:11px;padding:2px 0}.tk .tl{flex:1}.tk .ts{font-family:'Spline Sans Mono',monospace;font-size:9px;color:#a1a1aa;text-transform:uppercase}.tk.ongoing .tl{font-weight:700}.tk.pending .tl{font-weight:600;color:#b45309}.dot{width:6px;height:6px;border-radius:50%;flex:none}.dot.production{background:#3f3f46}.dot.coordination{background:#f59e0b}.none{font-size:10px;color:#a1a1aa;font-style:italic}.u{color:#dc2626}.ft{margin-top:28px;border-top:1px solid #d4d4d8;padding-top:8px;font-size:9px;color:#a1a1aa;display:flex;justify-content:space-between}@media print{body{padding:0}}</style></head><body><div class='hd'><img src='data:image/svg+xml;base64,"+LOGO_B64+"' alt='logo'/><div class='co'><b>"+esc(c.name||"Studio 16 Architects")+"</b><br>"+esc(c.address||"")+"<br>"+esc(c.email||"")+(c.website?" · "+esc(c.website):"")+"</div></div><div class='ttl'>Live Projects</div><div class='sub'>"+live.length+" live · generated "+today()+"</div>"+(sec||"<p style='color:#a1a1aa;font-size:12px'>No live projects.</p>")+"<div class='ft'><span>"+esc(c.name||"Studio 16 Architects")+"</span><span>"+esc(c.website||"")+"</span></div></body></html>"; const w=window.open("","_blank"); if(!w){ setErr("Allow pop-ups for this site to print."); return; } w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>{ try{w.print();}catch(e){} },450); }

            )}

            <div className="mb-4 grid grid-cols-2 gap-2 sm:grid-cols-4">
              {boardMembers.map((m,ai)=>{ const ps=projects.filter(p=>p.lead===m.id||p.tasks.some(t=>t.assignee===m.id)); const liveN=ps.filter(p=>p.status==="live").length; const topN=ps.filter(p=>p.status==="live"&&p.priority==="top").length; const a=m.id===selId; const isLead=board?.leadId===m.id; const pal=roleColor(m.role); return (
                <div key={m.id} className={`flex items-center gap-1.5 rounded-lg border p-2.5 shadow-sm transition ${a?"border-zinc-900 bg-zinc-900 text-white":"border-zinc-200 bg-zinc-100 hover:bg-zinc-50"}`}>
                  <button onClick={()=>{setSelId(m.id);setExpanded(null);setRemoveM(false);setEditM(null);setShareOpen(false);}} className="flex min-w-0 flex-1 items-center gap-2.5 text-left">
                    <span className={`mono flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[11px] font-semibold ${a?"bg-white text-zinc-900":`${pal.bg} ${pal.text}`}`}>{initials(m.name)}</span>
                    <span className="min-w-0 flex-1"><span className="flex items-center gap-1"><span className="truncate text-[12px] font-semibold leading-tight">{m.name}</span>{isLead&&<span className={`mono shrink-0 rounded px-1 py-0.5 text-[8px] font-bold uppercase ${a?"bg-white/20 text-white":"bg-zinc-200 text-zinc-600"}`}>Lead</span>}</span><span className={`mono block truncate text-[9px] ${a?"text-zinc-400":pal.text}`}>{m.role}{m.teamId?` · ${m.teamId}`:""}</span><span className={`mono text-[9px] ${a?"text-zinc-500":"text-zinc-400"}`}>{liveN} live</span></span>
                  </button>
                  {topN>0&&<span className="h-2 w-2 shrink-0 rounded-full bg-red-500" />}
                  <Reorder onUp={()=>moveMember(m.id,-1)} onDown={()=>moveMember(m.id,1)} upOk={ai>0} downOk={ai<boardMembers.length-1} />
                </div>
              ); })}
            </div>
            {!boardMembers.length && <div className="mb-4 rounded-lg border border-dashed border-zinc-300 bg-white py-8 text-center text-[12px] text-zinc-400">No members in this board yet{isAdmin?" — tap “+ Add member”.":"."}</div>}
            {archived.length>0 && isAdmin && <div className="mb-4 text-[11px] text-zinc-400">Archived: {archived.map(m=><button key={m.id} onClick={()=>restore(m.id)} className="mr-2 underline hover:text-zinc-700">{m.name} (restore)</button>)}</div>}

            {sel && <>
              <div className="mb-3 flex flex-wrap items-center justify-between gap-3 border-b border-zinc-200 pb-3">
                <div className="flex items-center gap-3"><Avatar name={sel.name} /><div><div className="text-base font-semibold leading-tight">{sel.name}</div><div className="mono text-[10px] uppercase tracking-wider text-zinc-500">{sel.role}{sel.teamId?` · ID ${sel.teamId}`:""}</div></div></div>
                <div className="flex gap-1"><button onClick={()=>setShareOpen(!shareOpen)} className="rounded-md border border-zinc-200 px-2.5 py-1.5 text-[11px] text-zinc-500 hover:border-zinc-400">Copy list</button>{isAdmin&&<><button onClick={()=>setEditM({name:sel.name,role:sel.role,teamId:sel.teamId||"",boardId:boardOf(sel)})} className="rounded-md border border-zinc-200 px-2.5 py-1.5 text-[11px] text-zinc-500 hover:border-zinc-400">Edit</button><button onClick={()=>{setRemoveM(!removeM);setReassign("");}} className="rounded-md border border-zinc-200 px-2.5 py-1.5 text-[11px] text-zinc-500 hover:border-red-300 hover:text-red-500">Remove</button></>}</div>
              </div>

              {shareOpen && <div className="mb-4 rounded-lg border border-zinc-300 bg-white p-3"><div className="mb-2 flex items-center justify-between"><span className="text-[12px] font-semibold text-zinc-700">{sel.name}'s task list — copy &amp; paste</span><button onClick={doCopy} className="rounded-md bg-zinc-900 px-3 py-1.5 text-[11px] font-medium text-white">{copied?"Copied!":"Copy"}</button></div><textarea id="shareArea" readOnly value={buildShare(sel)} className="mono h-48 w-full resize-y rounded-md border border-zinc-200 bg-zinc-50 p-2 text-[12px] text-zinc-700 outline-none" /></div>}

              {editM && <div className="mb-4 flex flex-wrap items-end gap-2 rounded-lg border border-zinc-300 bg-white p-3"><div className="min-w-[140px] flex-1"><Lbl>Name</Lbl><Input value={editM.name} onChange={e=>setEditM({...editM,name:e.target.value})} /></div><div className="w-44"><Lbl>Role</Lbl><RoleField value={editM.role} onChange={v=>setEditM({...editM,role:v})} /></div><div className="w-28"><Lbl>Team ID</Lbl><Input value={editM.teamId} onChange={e=>setEditM({...editM,teamId:e.target.value})} /></div>{boards.length>1&&<div className="w-40"><Lbl>Board</Lbl><Select value={editM.boardId||activeBoard} onChange={v=>setEditM({...editM,boardId:v})} options={boards.map(b=>({value:b.id,label:b.name}))} className="w-full" /></div>}<button onClick={saveMember} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Save</button><button onClick={()=>setEditM(null)} className="rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] text-zinc-600">Cancel</button></div>}

              {removeM && isAdmin && <div className="mb-4 rounded-lg border border-red-200 bg-red-50 p-3 text-[12px]"><div className="mb-2 text-red-700">Reassign {sel.name}'s active work to:</div><div className="flex flex-wrap items-center gap-2"><Select value={reassign} onChange={setReassign} options={[{value:"",label:"Unassigned"},...active.filter(m=>m.id!==selId).map(m=>({value:m.id,label:m.name}))]} className="w-44" /><button onClick={doRemoveMember} className="rounded-md bg-red-600 px-3 py-1.5 font-medium text-white">Remove / archive</button><button onClick={()=>setRemoveM(false)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-zinc-600">Cancel</button></div></div>}

              <div className="mb-4 flex flex-wrap items-center gap-2"><span className="mono mr-1 text-[10px] uppercase tracking-wider text-zinc-400">Show</span>{[{v:"all",l:"All work"},{v:"production",l:"PC / Production"},{v:"coordination",l:"Coordination / Follow-up"}].map(o=><button key={o.v} onClick={()=>setWt(o.v)} className={`rounded-full border px-3 py-1 text-[11px] font-medium ${wt===o.v?"border-zinc-400 bg-zinc-100 text-zinc-900":"border-zinc-200 bg-white text-zinc-500 hover:bg-zinc-50"}`}>{o.l}</button>)}</div>

              {["top","medium","low"].map(lvl=>{ const rows=mine.filter(p=>p.status==="live"&&p.priority===lvl&&matchWt(p)).sort((a,b)=>a.sort-b.sort); if(!rows.length) return null; return (
                <section key={lvl} className="mb-4">
                  <div className="mb-2 flex items-center gap-2"><Dot level={lvl} /><h3 className={`text-[11px] font-semibold uppercase tracking-wider ${PRIORITY[lvl].text}`}>{PRIORITY[lvl].label} Priority</h3><div className="ml-2 h-px flex-1 bg-zinc-200" /></div>
                  <div className="space-y-2">{rows.map(p=>{ const open=expanded===p.id; const openN=p.tasks.filter(t=>t.assignee===selId&&t.status!=="done").length; return (
                    <div key={p.id} className="rounded-lg border border-zinc-200 bg-white">
                      <button onClick={()=>setExpanded(open?null:p.id)} className="flex w-full items-center gap-2 px-3 py-2 text-left">
                        <span className="text-[11px] text-zinc-400">{open?"▾":"▸"}</span>
                        <span className="min-w-0 flex-1 text-[13px] font-semibold">{p.code} · {p.nickname||p.client}</span>
                        <span className="mono text-[10px] uppercase text-zinc-400">{openN} open</span>
                      </button>
                      {!open && previewTasks(p,selId)}
                      {open && <div className="border-t border-zinc-100 p-3">{projectControls(p)}{renderTasks(p)}</div>}
                    </div>
                  ); })}</div>
                </section>
              ); })}
              {!mine.some(p=>p.status==="live"&&matchWt(p)) && <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-8 text-center text-[12px] text-zinc-400">No live work in this view.</div>}
            </>}

            {isAdmin && (()=>{ const orphan=projects.filter(p=>p.status==="live"&&!p.lead&&!p.tasks.some(t=>t.assignee)); if(!orphan.length) return null; return (
              <div className="mt-6 rounded-lg border border-amber-200 bg-amber-50 p-3"><div className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-amber-700">Unassigned projects ({orphan.length}) — give each a lead</div>{orphan.map(p=>(<div key={p.id} className="flex items-center gap-2 py-1 text-[12px]"><span className="flex-1 font-medium">{p.code} · {p.nickname||p.client}</span><Select value="__none" onChange={v=>v!=="__none"&&patchProject(p.id,{lead_member_id:v})} options={[{value:"__none",label:"Assign lead…"},...active.map(m=>({value:m.id,label:m.name}))]} className="w-40" /></div>))}</div>
            ); })()}
            </>)}

            {tab==="board" && isAdmin && (<>
              <div className="mb-4 flex flex-wrap items-center justify-between gap-2">
                <h2 className="text-base font-semibold">Live Projects <span className="mono text-[11px] text-zinc-400">{projects.filter(p=>p.status==="live").length} live</span></h2>
                <div className="flex gap-1"><button onClick={()=>setShowBoardShare(s=>!s)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600 hover:bg-zinc-50">Copy list</button><button onClick={printBoard} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600 hover:bg-zinc-50">Print / PDF</button></div>
              </div>
              {showBoardShare && <div className="mb-4 rounded-lg border border-zinc-300 bg-white p-3"><div className="mb-2 flex items-center justify-between"><span className="text-[12px] font-semibold text-zinc-700">Live projects — copy &amp; paste</span><button onClick={copyBoard} className="rounded-md bg-zinc-900 px-3 py-1.5 text-[11px] font-medium text-white">{boardCopied?"Copied!":"Copy"}</button></div><textarea readOnly value={buildBoardShare()} className="mono h-56 w-full resize-y rounded-md border border-zinc-200 bg-zinc-50 p-2 text-[12px] text-zinc-700 outline-none" /></div>}
              {["top","medium","low"].map(lvl=>{ const rows=projects.filter(p=>p.status==="live"&&p.priority===lvl).sort((a,b)=>a.sort-b.sort); if(!rows.length) return null; return (
                <section key={lvl} className="mb-4">
                  <div className="mb-2 flex items-center gap-2"><Dot level={lvl} /><h3 className={`text-[11px] font-semibold uppercase tracking-wider ${PRIORITY[lvl].text}`}>{PRIORITY[lvl].label} Priority</h3><span className="mono text-[10px] text-zinc-400">{rows.length}</span><div className="ml-2 h-px flex-1 bg-zinc-200" /></div>
                  <div className="space-y-1.5">{rows.map((p,i)=>{ const lead=byId(p.lead); const pal=lead?roleColor(lead.role):null; const og=p.tasks.filter(t=>t.status==="ongoing").length; const pend=p.tasks.filter(t=>t.workType==="coordination"&&t.status==="pending").length; const un=p.tasks.filter(t=>!t.assignee).length; const open=expanded===p.id; return (
                    <div key={p.id} className="rounded-lg border border-zinc-200 bg-white">
                      <div className="flex items-center gap-2 px-3 py-2">
                        <button onClick={()=>setExpanded(open?null:p.id)} className="flex min-w-0 flex-1 items-center gap-2 text-left"><span className="text-[11px] text-zinc-400">{open?"▾":"▸"}</span><span className="min-w-0"><span className="mono text-[12px] font-semibold">{p.code}</span> <span className="text-[12px] text-zinc-600">{p.nickname||p.client}</span></span></button>
                        <span className="hidden items-center gap-1.5 text-[11px] text-zinc-500 sm:flex">{lead?<><span className={`mono flex h-5 w-5 items-center justify-center rounded-full text-[8px] font-semibold ${pal.bg} ${pal.text}`}>{initials(lead.name)}</span>{lead.name}</>:<span className="font-medium text-red-500">No lead</span>}</span>
                        <span className="mono shrink-0 text-[10px] uppercase text-zinc-400">{og} ong{pend?` · ${pend} pend`:""}{un>0&&<span className="text-red-500"> · {un} unassigned</span>}</span>
                        <Reorder onUp={()=>moveProject(rows,p.id,-1)} onDown={()=>moveProject(rows,p.id,1)} upOk={i>0} downOk={i<rows.length-1} />
                      </div>
                      {!open && previewTasks(p,null)}
                      {open && <div className="border-t border-zinc-100 p-3">{projectControls(p)}{renderTasks(p)}</div>}
                    </div>
                  ); })}</div>
                </section>
              ); })}
              {!projects.some(p=>p.status==="live") && <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-10 text-center text-[12px] text-zinc-400">No live projects yet — add one from the Registry.</div>}
            </>)}

            {tab==="registry" && isAdmin && (<>
              <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
                <h2 className="text-base font-semibold">Project Registry <span className="mono text-[11px] text-zinc-400">{projects.length} total</span></h2>
                <button onClick={()=>{setShowRegAdd(s=>!s); setNp(s=>({...s,lead:"__none",status:"live"}));}} className="rounded-md bg-zinc-900 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-zinc-700">+ Add project</button>
              </div>
              {showRegAdd && (
                <div className="mb-4 rounded-lg border border-zinc-300 bg-white p-3">
                  <div className="mb-2"><Lbl>Paste full project name</Lbl><Input value={np.raw} onChange={e=>setNp({...np,raw:e.target.value,...parseName(e.target.value)})} placeholder="5102_LT GEN SHAFIQUR RAHMAN_JOLSHIRI_5 Katha_PLOT ID 17" /></div>
                  <div className="grid grid-cols-2 gap-2 sm:grid-cols-4">
                    <div><Lbl>Code</Lbl><Input value={np.code} onChange={e=>setNp({...np,code:e.target.value})} /></div>
                    <div><Lbl>Client</Lbl><Input value={np.client} onChange={e=>setNp({...np,client:e.target.value})} /></div>
                    <div><Lbl>Location</Lbl><Input value={np.location} onChange={e=>setNp({...np,location:e.target.value})} /></div>
                    <div><Lbl>Nickname</Lbl><Input value={np.nickname} onChange={e=>setNp({...np,nickname:e.target.value})} /></div>
                    <div><Lbl>Size</Lbl><Input value={np.size} onChange={e=>setNp({...np,size:e.target.value})} /></div>
                    <div><Lbl>Priority</Lbl><Select value={np.priority} onChange={v=>setNp({...np,priority:v})} options={PRIORITY_OPTS} className="w-full" /></div>
                    <div><Lbl>Status</Lbl><Select value={np.status} onChange={v=>setNp({...np,status:v})} options={STATUS_OPTS} className="w-full" /></div>
                    <div><Lbl>Lead</Lbl><Select value={np.lead} onChange={v=>setNp({...np,lead:v})} options={[...active.map(m=>({value:m.id,label:m.name})),{value:"__none",label:"Unassigned"}]} className="w-full" /></div>
                  </div>
                  <div className="mt-3 flex gap-2"><button onClick={addProject} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Create project</button><button onClick={()=>setShowRegAdd(false)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600">Cancel</button></div>
                </div>
              )}
              <div className="mb-3 flex flex-wrap items-center gap-2">
                <Input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search code, client, nickname, location…" className="max-w-xs flex-1" />
                <Select value={regStatus} onChange={setRegStatus} options={[{value:"all",label:"All statuses"},...STATUS_OPTS,{value:"unassigned",label:"Unassigned only"}]} className="w-40" />
              </div>
              {(()=>{ const ql=q.trim().toLowerCase(); const filtered=projects.filter(p=>{ const txt=(p.code+" "+(p.nickname||"")+" "+(p.client||"")+" "+(p.location||"")).toLowerCase(); if(ql&&!txt.includes(ql)) return false; if(regStatus==="unassigned") return !p.lead; if(regStatus!=="all") return p.status===regStatus; return true; }); const groups={}; filtered.forEach(p=>{ const y=yearOf(p.code); const k=y?String(y):"Unsorted"; (groups[k]=groups[k]||[]).push(p); }); const years=Object.keys(groups).sort((a,b)=> a==="Unsorted"?1:b==="Unsorted"?-1:Number(b)-Number(a)); if(!filtered.length) return <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-10 text-center text-[12px] text-zinc-400">No projects match.</div>; return years.map(yr=>(
                <section key={yr} className="mb-4">
                  <div className="mb-1.5 flex items-center gap-2"><h3 className="mono text-[11px] font-semibold tracking-wider text-zinc-500">{yr}</h3><span className="mono text-[10px] text-zinc-400">{groups[yr].length}</span><div className="ml-1 h-px flex-1 bg-zinc-200" /></div>
                  <div className="space-y-1">{groups[yr].slice().sort((a,b)=>String(a.code).localeCompare(String(b.code),undefined,{numeric:true})).map(p=>{ const lead=byId(p.lead); const ed=editP&&editP.id===p.id; return (
                    <div key={p.id} className="rounded-lg border border-zinc-200 bg-white">
                      <div className="flex items-center gap-2 px-3 py-2">
                        <button onClick={()=>setEditP(ed?null:{id:p.id,code:p.code,nickname:p.nickname||"",client:p.client||"",location:p.location||"",size:p.size||"",address:p.address||"",priority:p.priority,status:p.status,lead:p.lead||"__none"})} className="flex min-w-0 flex-1 items-center gap-2 text-left">
                          <Dot level={p.priority} />
                          <span className="mono text-[12px] font-semibold">{p.code}</span>
                          <span className="min-w-0 truncate text-[12px] text-zinc-600">{p.nickname||p.client}{p.location?` · ${p.location}`:""}</span>
                        </button>
                        {lead && <span className="hidden text-[10px] text-zinc-400 sm:block">{lead.name}</span>}
                        <span className={`mono shrink-0 rounded px-1.5 py-0.5 text-[9px] font-semibold uppercase ${STATUS_TONE[p.status]}`}>{STATUS[p.status]}</span>
                        <button onClick={()=>setEditP(ed?null:{id:p.id,code:p.code,nickname:p.nickname||"",client:p.client||"",location:p.location||"",size:p.size||"",address:p.address||"",priority:p.priority,status:p.status,lead:p.lead||"__none"})} className="shrink-0 px-1 text-[11px] text-zinc-400 hover:text-zinc-800">{ed?"▾":"✎"}</button>
                      </div>
                      {ed && <div className="border-t border-zinc-100 p-3">
                        <div className="grid grid-cols-2 gap-2 sm:grid-cols-4">
                          <div><Lbl>Code</Lbl><Input value={editP.code} onChange={e=>setEditP({...editP,code:e.target.value})} /></div>
                          <div><Lbl>Client</Lbl><Input value={editP.client} onChange={e=>setEditP({...editP,client:e.target.value})} /></div>
                          <div><Lbl>Location</Lbl><Input value={editP.location} onChange={e=>setEditP({...editP,location:e.target.value})} /></div>
                          <div><Lbl>Nickname</Lbl><Input value={editP.nickname} onChange={e=>setEditP({...editP,nickname:e.target.value})} /></div>
                          <div><Lbl>Size</Lbl><Input value={editP.size} onChange={e=>setEditP({...editP,size:e.target.value})} /></div>
                          <div className="sm:col-span-3"><Lbl>Address</Lbl><Input value={editP.address} onChange={e=>setEditP({...editP,address:e.target.value})} /></div>
                          <div><Lbl>Priority</Lbl><Select value={editP.priority} onChange={v=>setEditP({...editP,priority:v})} options={PRIORITY_OPTS} className="w-full" /></div>
                          <div><Lbl>Status</Lbl><Select value={editP.status} onChange={v=>setEditP({...editP,status:v})} options={STATUS_OPTS} className="w-full" /></div>
                          <div className="sm:col-span-2"><Lbl>Lead</Lbl><Select value={editP.lead} onChange={v=>setEditP({...editP,lead:v})} options={[{value:"__none",label:"Unassigned"},...active.map(m=>({value:m.id,label:m.name}))]} className="w-full" /></div>
                        </div>
                        <div className="mt-3 flex flex-wrap items-center gap-2">
                          <button onClick={saveEditP} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Save</button>
                          <button onClick={()=>setEditP(null)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600">Cancel</button>
                          <span className="ml-auto" />
                          {delP===p.id ? <span className="flex items-center gap-2 text-[11px] text-red-600">Delete this project &amp; its tasks?<button onClick={()=>deleteProject(p.id)} className="rounded-md bg-red-600 px-2 py-1 font-medium text-white">Yes, delete</button><button onClick={()=>setDelP(null)} className="rounded-md border border-zinc-300 px-2 py-1 text-zinc-600">No</button></span> : <button onClick={()=>setDelP(p.id)} className="rounded-md border border-zinc-200 px-3 py-1.5 text-[11px] text-zinc-400 hover:border-red-300 hover:text-red-500">Delete</button>}
                        </div>
                        <div className="mt-3 border-t border-zinc-100 pt-3"><div className="mb-2 mono text-[10px] uppercase tracking-wider text-zinc-400">Tasks</div>{renderTasks(p)}</div>
                      </div>}
                    </div>
                  ); })}</div>
                </section>
              )); })()}
            </>)}
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
