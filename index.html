      const [tab,setTab]=useState("team"); const [q,setQ]=useState(""); const [regStatus,setRegStatus]=useState("all"); const [editP,setEditP]=useState(null); const [delP,setDelP]=useState(null); const [showRegAdd,setShowRegAdd]=useState(false); const [showBoardShare,setShowBoardShare]=useState(false); const [boardCopied,setBoardCopied]=useState(false); const [subOpen,setSubOpen]=useState({}); const [printUpcoming,setPrintUpcoming]=useState(false); const [viewAs,setViewAs]=useState("admin"); const [allProfiles,setAllProfiles]=useState([]); const [pEdit,setPEdit]=useState(null); const [showSeen,setShowSeen]=useState(false); const [area,setArea]=useState("design"); const [myCheckin,setMyCheckin]=useState(null); const [leads,setLeads]=useState([]); const [showAddLead,setShowAddLead]=useState(false); const [nl,setNl]=useState({name:"",phone:"",email:"",who:"",projectType:"",location:"",presentAddress:"",plotSize:"",roadWidth:"",services:"",message:""}); const [leadEdit,setLeadEdit]=useState(null); const [convFor,setConvFor]=useState(null); const [convDraft,setConvDraft]=useState({code:"",priority:"medium"}); const [receivables,setReceivables]=useState([]); const [showAddRcv,setShowAddRcv]=useState(false); const [nr,setNr]=useState({projectId:"",title:"",amount:"",dueDate:""}); const [rcvEdit,setRcvEdit]=useState(null); const [finTab,setFinTab]=useState("receivables"); const [expenses,setExpenses]=useState([]); const [showAddExp,setShowAddExp]=useState(false); const [ne,setNe]=useState({date:dayStr(),category:"Rent",payee:"",amount:"",method:"",note:""}); const [expEdit,setExpEdit]=useState(null); const [expMonth,setExpMonth]=useState(dayStr().slice(0,7));

      async function load(initial){

      async function signIn(e){ e.preventDefault(); setBusy(true); setErr(""); const raw=email.trim(); const id=raw.includes("@")?raw.toLowerCase():raw.toLowerCase()+"@"+LOGIN_DOMAIN; const {error}=await db.auth.signInWithPassword({email:id,password:pw}); if(error) setErr(error.message==="Invalid login credentials"?"Wrong Team ID or password.":error.message); setBusy(false); }

      async function moveMemberProject(mid,lvl,pid,dir){ const m=byId(mid); const ord=m.projOrder||[]; const rank=p=>{ const i=ord.indexOf(p.id); return i<0?1000000+(p.sort||0):i; }; const g={top:[],medium:[],low:[]}; projects.filter(p=>p.status==="live"&&(p.lead===mid||p.tasks.some(t=>t.assignee===mid))).forEach(p=>{ if(g[p.priority]) g[p.priority].push(p); }); Object.keys(g).forEach(k=>g[k].sort((a,b)=>rank(a)-rank(b))); const arr=g[lvl]; const i=arr.findIndex(p=>p.id===pid); const j=i+dir; if(i<0||j<0||j>=arr.length) return; const t=arr[i]; arr[i]=arr[j]; arr[j]=t; const newOrder=[...g.top,...g.medium,...g.low].map(p=>p.id); if(fail((await db.from("members").update({project_order:newOrder}).eq("id",mid)).error)) return; await refresh(); }

m:2px solid #18181b;padding-bottom:14px}.hd img{height:42px}.hd .co{text-align:right;font-size:10px;color:#52525b;line-height:1.5}.ttl{margin:22px 0 4px;font-size:19px;font-weight:700}.sub{font-size:11px;color:#71717a;margin-bottom:14px}h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px;color:#18181b}h2 span{color:#a1a1aa;font-weight:500;margin-left:4px}h2.top{color:#dc2626}h2.medium{color:#d97706}.pj{border:1px solid #e4e4e7;border-radius:7px;padding:9px 11px;margin-bottom:8px;page-break-inside:avoid}.ph{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}.pc{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:13px}.pn{font-size:13px;flex:1}.pl{font-size:10px;color:#71717a}.grp{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#a1a1aa;margin:5px 0 2px}.tk{display:flex;align-items:center;gap:6px;font-size:11px;padding:2px 0}.tk .tl{flex:1}.tk .ts{font-family:'Spline Sans Mono',monospace;font-size:9px;color:#a1a1aa;text-transform:uppercase}.tk.ongoing .tl{font-weight:700}.tk.pending .tl{font-weight:600;color:#b45309}.dot{width:6px;height:6px;border-radius:50%;flex:none}.dot.production{background:#3f3f46}.dot.coordination{background:#f59e0b}.none{font-size:10px;color:#a1a1aa;font-style:italic}.u{color:#dc2626}.ft{margin-top:28px;border-top:1px solid #d4d4d8;padding-top:8px;font-size:9px;color:#a1a1aa;display:flex;justify-content:space-between}@media print{body{padding:0}}</style></head><body><div class='hd'><img src='data:image/svg+xml;base64,"+LOGO_B64+"' alt='logo'/><div class='co'><b>"+esc(c.name||"Studio 16 Architects")+"</b><br>"+esc(c.address||"")+"<br>"+esc(c.email||"")+(c.website?" · "+esc(c.website):"")+"</div></div><div class='ttl'>Live Projects</div><div class='sub'>"+live.length+" live · generated "+today()+"</div>"+(sec||"<p style='color:#a1a1aa;font-size:12px'>No live projects.</p>")+"<div class='ft'><span>"+esc(c.name||"Studio 16 Architects")+"</span><span>"+esc(c.website||"")+"</span></div></body></html>"; const w=window.open("","_blank"); if(!w){ setErr("Allow pop-ups for this site to print."); return; } w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>{ try{w.print();}catch(e){} },450); }

                  <div className="mb-2 flex items-center gap-2"><Dot level={lvl} /><h3 className={`text-[11px] font-semibold uppercase tracking-wider ${PRIORITY[lvl].text}`}>{PRIORITY[lvl].label} Priority</h3><div className="ml-2 h-px flex-1 bg-zinc-200" /></div>

                    <div key={p.id} className={`flex items-stretch gap-1.5 rounded-lg border bg-white ${workNow?"border-emerald-400 ring-1 ring-emerald-300":"border-zinc-200"}`}>

                      </div>
                      <div className="flex items-center pr-1"><Reorder onUp={()=>moveMemberProject(selId,lvl,p.id,-1)} onDown={()=>moveMemberProject(selId,lvl,p.id,1)} upOk={ri>0} downOk={ri<rows.length-1} /></div>
                    </div>

              {!mine.some(p=>p.status==="live"&&matchWt(p)) && <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-8 text-center text-[12px] text-zinc-400">No live work in this view.</div>}

            <div className="flex flex-wrap items-center justify-between gap-2 border-t border-zinc-200 pt-4 text-[11px] text-zinc-400">
              <span>{profile?.companies?.name||"Studio 16 Architects"}{profile?.companies?.website?" · "+profile.companies.website:""}</span>
              {(()=>{ const others=allProfiles.filter(p=>p.id!==profile?.id&&p.last_seen).sort((a,b)=>new Date(b.last_seen)-new Date(a.last_seen)); const last=others[0]; return <button onClick={()=>setShowSeen(s=>!s)} className="mono hover:text-zinc-700">{last?`Last opened by ${last.name||last.employee_id} · ${relTime(last.last_seen)}`:"Team activity"} {showSeen?"▾":"▸"}</button>; })()}
              <span className="mono">{new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</span>
            </div>
          </footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
