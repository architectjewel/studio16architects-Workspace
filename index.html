e drawings."],["6300","Interior / Furniture Detail Design","• Interior concept, materials and finishes.\n• Furniture and loose-item layout.\n• Visuals for client approval."],["6400","Interior Working Drawing for Construction","• Detailed interior and joinery drawings.\n• Ceiling, flooring, wall-finish and lighting details.\n• Construction-ready interior package."],["6500","Sound / Automation / Security System Design","• Concept for AV, home-automation and security.\n• Device zoning and cabling strategy.\n• Coordinated with interior and electrical."],["6600","Sound / Automation / Security Working Drawing","• Layouts, conduit routing and device schedules.\n• Integration and termination details.\n• Construction-ready system drawings."],["6700","Non-RCC Cost Estimation / BOQ Preparation","• Quantity take-off for finishing / non-RCC works.\n• Rate-based bill of quantities.\n• Cost basis for budgeting and tender."],["7100","Site Visit for Supervision","• Periodic site inspection by experienced staff.\n• Works checked against approved drawings.\n• Observation report each visit."],["7200","Construction Top Supervision","• Stage-wise quality monitoring of construction.\n• Guidance to contractor on design intent.\n• Issue resolution during execution."],["7300","Construction Support","• Material selection and market-visit support.\n• Coordination among design and site teams.\n• On-request assistance through construction."],["8100","Construction Execution","• Need-based construction management / execution.\n• Procurement, scheduling and quality control.\n• Scope and payment agreed per requirement."]];
    const TC_SEED = [["Mode of Payment","All prices are exclusive of TAX, VAT and AIT, applied at the relevant rate.\nPay first to obtain a package or any phase of it.\nWhere the schedule allows, multiple phases may proceed together, with payment for those phases made before they start.\nWe accept payment by Bank Transfer, cheque, bKash or cash.",true],["Site Visit, Supervision & Market Visit","Site visit, construction supervision and market visit for material selection are not included in this package, but are strongly recommended at each design and construction phase.\nFees per visit per personnel: Inside Dhaka — Tk 5,000 (conveyance included); Outside Dhaka — Tk 5,000 (conveyance excluded).\nEach visit is conducted by an architect or engineer with minimum 5 years experience.\nPayment must be made before each visit.",true],["Digital Survey & Soil Test","We provide support for plot Digital Survey [1200] and Soil Test [1300] as per project requirements.\nService details and payment modules are discussed and provided after commissioning the project.",true],["Logistical Support","We provide logistical support [3300] for Land-use Clearance / Planning Permit, Construction Permit, other government NOC/approvals and utility connections (WASA/DESCO/TITAS).\nThis support is offered only alongside our main services, on request.\nService details and payment are provided after commissioning.",true],["Construction","Construction [8100] is a need-based service to support the client through the construction process, in full or in part as required.\nIf requested, we manage these services so the work proceeds smoothly.\nService details and payment are provided after commissioning.",true],["Occupancy Certificate (As-Built)","We provide support for As-Built drawing preparation [3400] to apply for the RAJUK/CDA/Authority Occupancy Certificate.\nService details and payment are provided after commissioning.\nThe client is solely responsible for any construction that deviates from the authority-approved drawing.",true],["Modification & Termination Policy","After finalization of the architectural basic drawing and design (phases 2200, 2300 and 6300), any major change is treated as additional work and charged accordingly.\nAny cancellation at any phase must be notified in writing (mail/email).\nThe client must obtain the service paid for; paid amounts are non-refundable.",true],["Construction Liability","Studio 16 Architects is not responsible for any misapplication of our technical design and drawings, and cannot be held liable for construction safety, quality or any violation of the authority-approved drawing.\nAny full or partial change of building occupancy type must be notified in writing and requires an approved NOC.",true],["General Terms & Conditions","All prices are exclusive of TAX, VAT and AIT, applied at the relevant rate.\nThis quotation is valid for 30 days from its date and must be confirmed in writing.\nAny service or payment made after 356 days from acceptance is subject to a 20% additional fee per extra year.\nDesign or specification changes may affect pricing.\nWe reserve the right to decline at any phase without assigning a reason.\nFees apply to any extra work.",true],["Required Documents","A true existing site survey drawing (digital survey recommended) for accurate detailing.\nA soil test report for structural design.\nA photocopy of the local authority land clearance / planning permit, if applicable.\nA list of the property/developer owners with correct addresses.",true],["Intellectual Property Rights","All concepts, drawings, designs and presentations are the production of the Studio 16 Architects design team, who reserve the copyright.\nThey may not be copied, reproduced or disclosed to any third party without written permission.\nStudio 16 Architects retains the right to reuse, document and publish these works.\nNative files (DWG/RVT/SKP/MAX/ArchiCAD) are not provided to the client under any circumstance.",true]];

    /* ===== small components ===== */
    function Select({value,onChange,options,className,tone}){
      return <select value={value} onChange={e=>onChange(e.target.value)} className={`mono rounded-md border px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900 ${tone||"border-zinc-300 text-zinc-700 bg-white"} ${className||""}`}>{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select>;
    }
    function TypeSelect({value,onChange,wt}){ const groups = wt==="production"?PROD_GROUPS:FOLLOW_GROUPS; return <select value={value} onChange={e=>onChange(e.target.value)} className="mono w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900">{groups.map(g=><optgroup key={g.g} label={g.g}>{g.items.map(([n,,code])=><option key={n} value={n}>{n}{code?` (${code})`:""}</option>)}</optgroup>)}<option value="__custom">✏ Custom task…</option></select>; }
    function Reorder({onUp,onDown,upOk,downOk}){ return <span className="flex flex-col leading-none"><button onClick={e=>{e.stopPropagation();upOk&&onUp();}} disabled={!upOk} className="px-1 text-[9px] text-zinc-400 hover:text-zinc-800 disabled:opacity-20">▲</button><button onClick={e=>{e.stopPropagation();downOk&&onDown();}} disabled={!downOk} className="px-1 text-[9px] text-zinc-400 hover:text-zinc-800 disabled:opacity-20">▼</button></span>; }
    function RoleField({value,onChange}){ const inList=ROLES.includes(value); const [custom,setCustom]=useState(!inList&&!!value); const showCustom=custom||(!inList&&!!value); return <><Select value={showCustom?"__custom":(inList?value:"")} onChange={v=>{ if(v==="__custom"){setCustom(true);onChange("");} else {setCustom(false);onChange(v);} }} className="w-full" options={[{value:"",label:"Select role…"},...ROLES.map(r=>({value:r,label:r})),{value:"__custom",label:"✏ Custom role…"}]} />{showCustom&&<input autoFocus value={value} onChange={e=>onChange(e.target.value)} placeholder="Type role…" className="mt-1 w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" />}</>; }
    const Lbl = ({children})=> <label className="mono mb-1 block text-[9px] uppercase tracking-wider text-zinc-400">{children}</label>;
    const Input = (p)=> <input {...p} className={`w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900 ${p.className||""}`} />;

    const Avatar = ({name})=> <span className="mono flex h-7 w-7 items-center justify-center rounded-full bg-zinc-800 text-[10px] font-semibold text-white">{name?initials(name):"—"}</span>;
    const ProjTitle = ({p})=> <span className="text-[13px] leading-tight"><span className="mono font-semibold">{p.code}</span>{(p.nickname||p.client)&&<span className="font-semibold"> {p.nickname||p.client}</span>}{p.location&&<span className="font-normal text-zinc-400"> · {p.location}</span>}</span>;
    const Stat = ({n,l,tone})=> <div className="flex flex-col"><span className={`mono text-base font-semibold leading-none ${tone==="red"?"text-red-500":"text-zinc-900"}`}>{n}</span><span className="mono mt-1 text-[9px] uppercase tracking-wider text-zinc-400">{l}</span></div>;

    /* ===== mappers (db row -> app shape) ===== */

    const mapProject = r=>({id:r.id,code:r.code,nickname:r.nickname,client:r.client,location:r.location,size:r.size,address:r.address,priority:r.priority,status:r.status,lead:r.lead_member_id,sort:r.sort_order,clientToken:r.client_token,tasks:[]});
    const mapTask = r=>({id:r.id,projectId:r.project_id,label:r.label,workType:r.work_type,cat:r.cat,code:r.code,status:r.status,assignee:r.assignee_member_id,contact:r.contact||"",doneDate:r.done_date,sort:r.sort_order,working:!!r.working});

      const [projects,setProjects]=useState([]);
      const [loading,setLoading]=useState(false);
      const [err,setErr]=useState("");
      const [email,setEmail]=useState(""); const [pw,setPw]=useState(""); const [busy,setBusy]=useState(false);
      const [selId,setSelId]=useState("");
      const [activeBoard,setActiveBoard]=useState("");
      const [wt,setWt]=useState("all");
      const [expanded,setExpanded]=useState(null);
      const [shareOpen,setShareOpen]=useState(false); const [copied,setCopied]=useState(false);
      const [showAddM,setShowAddM]=useState(false); const [nm,setNm]=useState({name:"",role:"Architect",teamId:""});
      const [editM,setEditM]=useState(null);
      const [removeM,setRemoveM]=useState(false); const [reassign,setReassign]=useState("");
      const [boardCfg,setBoardCfg]=useState(false); const [addBoardOpen,setAddBoardOpen]=useState(false); const [nb,setNb]=useState({name:"",desc:"",leadId:""});
      const [showAddP,setShowAddP]=useState(false); const [np,setNp]=useState({raw:"",code:"",nickname:"",client:"",location:"",size:"",address:"",priority:"medium",status:"live",lead:"__none"});
      const [addTaskFor,setAddTaskFor]=useState(null); const [td,setTd]=useState({workType:"production",type:PROD_GROUPS[0].items[0][0],label:"",contact:"",assignee:"__none"});
      const [tab,setTab]=useState("team"); const [q,setQ]=useState(""); const [regStatus,setRegStatus]=useState("all"); const [editP,setEditP]=useState(null); const [delP,setDelP]=useState(null); const [showRegAdd,setShowRegAdd]=useState(false); const [showBoardShare,setShowBoardShare]=useState(false); const [boardCopied,setBoardCopied]=useState(false); const [subOpen,setSubOpen]=useState({}); const [printUpcoming,setPrintUpcoming]=useState(false); const [viewAs,setViewAs]=useState("admin"); const [allProfiles,setAllProfiles]=useState([]); const [pEdit,setPEdit]=useState(null); const [showSeen,setShowSeen]=useState(false); const [area,setArea]=useState("design"); const [myCheckin,setMyCheckin]=useState(null); const [leads,setLeads]=useState([]); const [showAddLead,setShowAddLead]=useState(false); const [nl,setNl]=useState({name:"",phone:"",email:"",who:"",projectType:"",location:"",presentAddress:"",plotSize:"",roadWidth:"",services:"",message:""}); const [leadEdit,setLeadEdit]=useState(null); const [convFor,setConvFor]=useState(null); const [convDraft,setConvDraft]=useState({code:"",priority:"medium"}); const [receivables,setReceivables]=useState([]); const [showAddRcv,setShowAddRcv]=useState(false); const [nr,setNr]=useState({projectId:"",title:"",amount:"",dueDate:""}); const [rcvEdit,setRcvEdit]=useState(null); const [finTab,setFinTab]=useState("receivables"); const [expenses,setExpenses]=useState([]); const [showAddExp,setShowAddExp]=useState(false); const [ne,setNe]=useState({date:dayStr(),category:"Rent",payee:"",amount:"",method:"",note:""}); const [expEdit,setExpEdit]=useState(null); const [expMonth,setExpMonth]=useState(dayStr().slice(0,7)); const [conTab,setConTab]=useState("site"); const [vendors,setVendors]=useState([]); const [bills,setBills]=useState([]); const [showAddVendor,setShowAddVendor]=useState(false); const [nvend,setNvend]=useState({name:"",type:"Material supplier",phone:"",note:""}); const [vendorEdit,setVendorEdit]=useState(null); const [showAddBill,setShowAddBill]=useState(false); const [nbill,setNbill]=useState({projectId:"",vendorId:"",category:"Materials",title:"",amount:"",date:dayStr(),dueDate:""}); const [billEdit,setBillEdit]=useState(null); const [siteTasks,setSiteTasks]=useState([]); const [showAddSite,setShowAddSite]=useState(false); const [ns,setNs]=useState({projectId:"",title:"",startDate:"",endDate:"",status:"not_started",progress:"0"}); const [siteEdit,setSiteEdit]=useState(null); const [salesTab,setSalesTab]=useState("leads"); const [catalog,setCatalog]=useState([]); const [showAddScope,setShowAddScope]=useState(false); const [nsc,setNsc]=useState({code:"",name:"",detail:""}); const [scopeEdit,setScopeEdit]=useState(null); const [tcs,setTcs]=useState([]); const [showAddTc,setShowAddTc]=useState(false); const [ntc,setNtc]=useState({title:"",body:""}); const [tcEdit,setTcEdit]=useState(null); const [resTab,setResTab]=useState("2025"); const [investments,setInvestments]=useState([]); const [showAddInv,setShowAddInv]=useState(false); const [ni,setNi]=useState({business:"",type:"Equity stake",amount:"",date:dayStr(),status:"active"}); const [invEdit,setInvEdit]=useState(null); const [proposals,setProposals]=useState([]); const [propEdit,setPropEdit]=useState(null); const [propNewOpen,setPropNewOpen]=useState(false); const [acceptDraft,setAcceptDraft]=useState(null);

      const realAdmin = profile?.role==="admin";
      const isAdmin = realAdmin && viewAs==="admin";
      const memberMode = realAdmin && viewAs==="member";
      const has = k => memberMode ? k==="design" : (realAdmin || (profile?.keys||["design"]).includes(k));
      const areas = ALL_KEYS.filter(([k])=>has(k));

      useEffect(()=>{ if(!db) return; db.auth.getSession().then(({data})=>setSession(data.session)); const {data:sub}=db.auth.onAuthStateChange((_e,s)=>setSession(s)); return ()=>sub.subscription.unsubscribe(); },[]);
      useEffect(()=>{ if(session) load(true); },[session]);

      async function load(initial){
        if(initial) setLoading(true); setErr("");
        try{
          let prof = profile;
          if(initial){ const {data:p,error:pe}=await db.from("profiles").select("*, companies(*)").eq("id",session.user.id).single(); if(pe) throw pe; prof=p; setProfile(p); try{ await db.rpc("touch_last_seen"); }catch(e){} }
          const [mb,bd,pr,tk,pf,ld,rc,ex,vn,cb,iv,st,sc,tc,pp]=await Promise.all([
            db.from("members").select("*").order("sort_order"),
            db.from("boards").select("*").order("sort_order"),
            db.from("projects").select("*").order("sort_order"),
            db.from("tasks").select("*").order("sort_order"),
            db.from("profiles").select("id,name,role,employee_id,phone,last_seen,keys").order("employee_id"),
            db.from("leads").select("*").order("created_at",{ascending:false}),
            db.from("receivables").select("*").order("sort_order"),
            db.from("expenses").select("*").order("date",{ascending:false}),
            db.from("vendors").select("*").order("sort_order"),
            db.from("con_bills").select("*").order("sort_order"),
            db.from("investments").select("*").order("sort_order"),
            db.from("site_tasks").select("*").order("sort_order"),
            db.from("scope_catalog").select("*").order("code"),
            db.from("tc_sections").select("*").order("sort_order"),
            db.from("proposals").select("*").order("sort_order"),
          ]);
          for(const r of [mb,bd,pr,tk]) if(r.error) throw r.error;
          if(!pf.error) setAllProfiles(pf.data||[]);
          if(!ld.error) setLeads((ld.data||[]).map(mapLead));
          if(!rc.error) setReceivables((rc.data||[]).map(mapRcv));
          if(!ex.error) setExpenses((ex.data||[]).map(mapExp));
          if(!vn.error) setVendors((vn.data||[]).map(mapVendor));
          if(!cb.error) setBills((cb.data||[]).map(mapBill));
          if(!iv.error) setInvestments((iv.data||[]).map(mapInv));
          if(!st.error) setSiteTasks((st.data||[]).map(mapSite));
          if(!sc.error) setCatalog((sc.data||[]).map(mapScope));
          if(!tc.error) setTcs((tc.data||[]).map(mapTc));
          if(!pp.error) setProposals((pp.data||[]).map(mapProp));
          let bds = bd.data.map(mapBoard);
          if(bds.length===0 && prof?.role==="admin"){ const {data:nbd}=await db.from("boards").insert({company_id:prof.company_id,name:"Design Team",description:"",sort_order:0}).select().single(); if(nbd) bds=[mapBoard(nbd)]; }
          const tasks = tk.data.map(mapTask);
          const projs = pr.data.map(mapProject).map(p=>({...p,tasks:tasks.filter(t=>t.projectId===p.id).sort((a,b)=>a.sort-b.sort)}));
          setMembers(mb.data.map(mapMember)); setBoards(bds); setProjects(projs);
          setActiveBoard(a=> a && bds.some(b=>b.id===a) ? a : (bds[0]?.id||""));
          try{ const {data:ci}=await db.from("attendance").select("*").eq("profile_id",session.user.id).eq("day",dayStr()).limit(1); setMyCheckin(ci&&ci[0]?ci[0]:null); }catch(e){}
        }catch(e){ setErr(e.message||String(e)); }
        if(initial) setLoading(false);
      }
      const refresh = ()=>load(false);
      const cid = ()=>profile.company_id;
      const fail = (e)=>{ if(e){ setErr(e.message||String(e)); return true; } return false; };

      async function signIn(e){ e.preventDefault(); setBusy(true); setErr(""); const raw=email.trim(); const id=raw.includes("@")?raw.toLowerCase():raw.toLowerCase()+"@"+LOGIN_DOMAIN; const {error}=await db.auth.signInWithPassword({email:id,password:pw}); if(error) setErr(error.message==="Invalid login credentials"?"Wrong Team ID or password.":error.message); setBusy(false); }
      async function signOut(){ await db.auth.signOut(); setSession(null); setProfile(null); setMembers([]); setBoards([]); setProjects([]); }

      const byId = id=>members.find(m=>m.id===id);
      const active = members.filter(m=>m.status==="active");
      const archived = members.filter(m=>m.status==="archived");
      const boardOf = m=> m.boardId || boards[0]?.id;
      const homeMembers = active.filter(m=> boardOf(m)===activeBoard).sort((a,b)=>a.sort-b.sort);
      const leadId0 = boards.find(b=>b.id===activeBoard)?.leadId;
      const activeLead = leadId0 && active.some(m=>m.id===leadId0) ? leadId0 : null;
      const boardMembers = (activeLead && !homeMembers.some(m=>m.id===activeLead)) ? [byId(activeLead), ...homeMembers] : homeMembers;
      const sel = byId(selId);
      const mine = projects.filter(p=> p.tasks.some(t=>t.assignee===selId && (t.status==="ongoing"||t.status==="pending")));
      const matchWt = p=> wt==="all" || p.tasks.some(t=>t.workType===wt);
      const kpis = {
        live: projects.filter(p=>p.status==="live").length,
        ongoing: projects.filter(p=>p.status==="live"&&p.tasks.some(t=>t.status==="ongoing")).length,
        hold: projects.filter(p=>p.status==="hold").length,
        unassigned: projects.filter(p=>p.status==="live"&&!p.lead).length,
        pending: projects.filter(p=>p.status==="live").reduce((a,p)=>a+p.tasks.filter(t=>t.workType==="coordination"&&t.status==="pending").length,0),
      };

      async function addMember(){ if(!nm.name.trim()) return; if(fail((await db.from("members").insert({company_id:cid(),board_id:activeBoard,name:nm.name.trim(),role:(nm.role||"Team member").trim(),team_id:nm.teamId.trim()||null,status:"active",sort_order:homeMembers.length})).error)) return; setNm({name:"",role:"Architect",teamId:""}); setShowAddM(false); await refresh(); }
      async function saveMember(){ const e=editM; if(fail((await db.from("members").update({name:e.name.trim()||sel.name,role:e.role.trim()||sel.role,team_id:e.teamId.trim()||null,board_id:e.boardId||boardOf(sel)}).eq("id",selId)).error)) return; setEditM(null); if(e.boardId&&e.boardId!==activeBoard) setSelId(""); await refresh(); }

></div></body></html>"; const w=window.open("","_blank"); if(!w){ setErr("Allow pop-ups for this site to print."); return; } w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>{ try{w.print();}catch(e){} },450); }

                  <section key={p?p.id:"__none"} className="mb-4">

                      {p?<><span className="mono text-[12px] font-bold">{p.code}</span><span className="text-[13px] font-semibold">{p.nickname||p.client||""}</span>{p.location&&<span className="text-[11px] text-zinc-400">{p.location}</span>}</>:<span className="text-[13px] font-semibold text-zinc-500">No project</span>}
                      <span className="mono ml-auto text-[11px] text-zinc-500">{done}/{its.length} done · <span className={delayed?"font-semibold text-red-500":"font-semibold text-zinc-700"}>{avg}%</span></span>
                    </div>
                    <div className="space-y-1.5">{its.map(it=>{ const ed=siteEdit&&siteEdit.id===it.id; return (
                      <div key={it.id} className="rounded-lg border border-zinc-200 bg-white">
                        <div className="px-3 py-2">
                          <div className="flex items-center gap-2">
                            <button onClick={()=>setSiteEdit(ed?null:{...it,progress:String(it.progress),startDate:it.startDate||"",endDate:it.endDate||"",assigneeId:it.assigneeId||"__none"})} className="flex min-w-0 flex-1 items-center gap-2 text-left">
                              <span className="text-[11px] text-zinc-400">{ed?"▾":"▸"}</span>
                              <span className="min-w-0 truncate text-[13px] font-medium">{it.title}</span>
                              {(it.startDate||it.endDate)&&<span className="mono hidden shrink-0 text-[10px] text-zinc-400 sm:inline">{(it.startDate||"?")}→{(it.endDate||"?")}</span>}
                            </button>
                            <span className="mono shrink-0 text-[11px] text-zinc-500">{it.progress}%</span>
                            <span className={`mono shrink-0 rounded border px-1.5 py-0.5 text-[9px] font-bold uppercase ${SITE_TONE[it.status]}`}>{SITE_LABEL[it.status]}</span>
                          </div>
                          <div className="mt-1.5 h-1.5 w-full rounded bg-zinc-100"><div className={`h-1.5 rounded ${SITE_BAR[it.status]}`} style={{width:Math.max(0,Math.min(100,it.progress))+"%"}} /></div>
                        </div>
                        {ed && <div className="border-t border-zinc-100 p-3">
                          <div className="grid grid-cols-2 gap-2 sm:grid-cols-3">
                            <div className="col-span-2 sm:col-span-1"><Lbl>Stage / activity</Lbl><Input value={siteEdit.title} onChange={e=>setSiteEdit({...siteEdit,title:e.target.value})} /></div>
                            <div><Lbl>Status</Lbl><Select value={siteEdit.status} onChange={v=>setSiteEdit({...siteEdit,status:v})} options={SITE_STATUS.map(([v,l])=>({value:v,label:l}))} className="w-full" /></div>
                            <div><Lbl>Progress %</Lbl><Input value={siteEdit.progress} onChange={e=>setSiteEdit({...siteEdit,progress:e.target.value})} /></div>
                            <div><Lbl>Start</Lbl><input type="date" value={siteEdit.startDate} onChange={e=>setSiteEdit({...siteEdit,startDate:e.target.value})} className="w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" /></div>
                            <div><Lbl>Target end</Lbl><input type="date" value={siteEdit.endDate} onChange={e=>setSiteEdit({...siteEdit,endDate:e.target.value})} className="w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" /></div>
                            <div><Lbl>Site in-charge</Lbl><Select value={siteEdit.assigneeId} onChange={v=>setSiteEdit({...siteEdit,assigneeId:v})} options={[{value:"__none",label:"—"},...active.map(m=>({value:m.id,label:m.name}))]} className="w-full" /></div>
                            <div className="col-span-2 sm:col-span-3"><Lbl>Note</Lbl><Input value={siteEdit.note} onChange={e=>setSiteEdit({...siteEdit,note:e.target.value})} /></div>
                          </div>
                          <div className="mt-3 flex flex-wrap items-center gap-2">
                            <button onClick={saveSite} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Save</button>
                            <button onClick={()=>setSiteEdit(null)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600">Cancel</button>
                            <button onClick={()=>deleteSite(it.id)} className="ml-auto rounded-md border border-zinc-200 px-3 py-1.5 text-[11px] text-zinc-400 hover:border-red-300 hover:text-red-500">Delete</button>
                          </div>
                        </div>}
                      </div>
                    ); })}</div>
                  </section>
                ); })}
                {!siteTasks.length && <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-10 text-center text-[12px] text-zinc-400">No site stages yet. Pick a project and add stages — or use the standard 13-stage sequence to start fast.</div>}
              </>); })()}
              {conTab==="bills" && (()=>{ const billed=bills.reduce((s,x)=>s+x.amount,0); const paid=bills.reduce((s,x)=>s+x.paidAmount,0); const overdue=bills.filter(x=>x.dueDate&&x.dueDate<dayStr()&&x.paidAmount<x.amount).reduce((s,x)=>s+(x.amount-x.paidAmount),0); const projOpts=projects.map(p=>({value:p.id,label:(p.code?p.code+" ":"")+(p.nickname||p.client||p.location||"Project")})); const vendOpts=[{value:"",label:"— no vendor —"},...vendors.map(v=>({value:v.id,label:v.name}))]; const vName=id=>{ const v=vendors.find(z=>z.id===id); return v?v.name:""; }; const byProj={}; bills.forEach(x=>{ const k=projects.some(p=>p.id===x.projectId)?x.projectId:"__none"; (byProj[k]=byProj[k]||[]).push(x); }); const groups=[...projects.filter(p=>byProj[p.id]&&byProj[p.id].length).map(p=>[p,byProj[p.id]]),...(byProj["__none"]?[[null,byProj["__none"]]]:[])]; const billRow=(it)=>{ const ed=billEdit&&billEdit.id===it.id; const st=rcvStatus(it); return (
                <div key={it.id} className="rounded-lg border border-zinc-200 bg-white">
                  <div className="flex items-center gap-2 px-3 py-2">
                    <button onClick={()=>setBillEdit(ed?null:{...it,amount:String(it.amount),paidAmount:String(it.paidAmount),date:it.date||dayStr(),dueDate:it.dueDate||"",paidDate:it.paidDate||"",vendorId:it.vendorId||"",projectId:it.projectId||""})} className="flex min-w-0 flex-1 items-center gap-2 text-left">
                      <span className="text-[11px] text-zinc-400">{ed?"▾":"▸"}</span>
                      <span className="shrink-0 rounded bg-zinc-100 px-1.5 py-0.5 text-[10px] text-zinc-600">{it.category}</span>
                      <span className="min-w-0 truncate text-[12px] font-medium text-zinc-700">{it.title||"Purchase"}{vName(it.vendorId)&&<span className="font-normal text-zinc-400"> · {vName(it.vendorId)}</span>}</span>
                    </button>
                    <span className="mono text-[12px] font-semibold">{money(it.amount)}</span>
                    <span className={`mono shrink-0 rounded border px-1.5 py-0.5 text-[9px] font-bold uppercase ${st[2]}`}>{st[1]}</span>
                  </div>
                  {ed && <div className="border-t border-zinc-100 p-3">
                    <div className="grid grid-cols-2 gap-2 sm:grid-cols-3">
                      <div className="col-span-2 sm:col-span-1"><Lbl>Project</Lbl><Select value={billEdit.projectId} onChange={v=>setBillEdit({...billEdit,projectId:v})} options={projOpts} className="w-full" /></div>
                      <div><Lbl>Vendor</Lbl><Select value={billEdit.vendorId} onChange={v=>setBillEdit({...billEdit,vendorId:v})} options={vendOpts} className="w-full" /></div>
                      <div><Lbl>Category</Lbl><Select value={billEdit.category} onChange={v=>setBillEdit({...billEdit,category:v})} options={CON_CATS.map(c=>({value:c,label:c}))} className="w-full" /></div>
                      <div><Lbl>Description</Lbl><Input value={billEdit.title} onChange={e=>setBillEdit({...billEdit,title:e.target.value})} /></div>
                      <div><Lbl>Amount (৳)</Lbl><Input value={billEdit.amount} onChange={e=>setBillEdit({...billEdit,amount:e.target.value})} /></div>
                      <div><Lbl>Bill date</Lbl><input type="date" value={billEdit.date} onChange={e=>setBillEdit({...billEdit,date:e.target.value})} className="w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" /></div>
                      <div><Lbl>Due date</Lbl><input type="date" value={billEdit.dueDate} onChange={e=>setBillEdit({...billEdit,dueDate:e.target.value})} className="w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" /></div>
                      <div><Lbl>Paid (৳)</Lbl><Input value={billEdit.paidAmount} onChange={e=>setBillEdit({...billEdit,paidAmount:e.target.value})} /></div>
                      <div><Lbl>Paid date</Lbl><input type="date" value={billEdit.paidDate} onChange={e=>setBillEdit({...billEdit,paidDate:e.target.value})} className="w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" /></div>
                      <div className="col-span-2 sm:col-span-3"><Lbl>Note</Lbl><Input value={billEdit.note} onChange={e=>setBillEdit({...billEdit,note:e.target.value})} /></div>
                    </div>
                    <div className="mt-3 flex flex-wrap items-center gap-2">
                      <button onClick={saveBill} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Save</button>
                      <button onClick={()=>setBillEdit(null)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600">Cancel</button>
                      <button onClick={()=>setBillEdit({...billEdit,paidAmount:billEdit.amount,paidDate:billEdit.paidDate||dayStr()})} className="rounded-md border border-emerald-300 px-3 py-1.5 text-[11px] font-medium text-emerald-700 hover:bg-emerald-50">Mark fully paid</button>
                      <button onClick={()=>deleteBill(it.id)} className="ml-auto rounded-md border border-zinc-200 px-3 py-1.5 text-[11px] text-zinc-400 hover:border-red-300 hover:text-red-500">Delete</button>
                    </div>
                  </div>}
                </div>
              ); }; return (<>
                <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
                  <h2 className="text-base font-semibold">Bills &amp; purchases</h2>
                  <button onClick={()=>setShowAddBill(s=>!s)} className="rounded-md bg-zinc-900 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-zinc-700">+ Add bill</button>
                </div>
                <div className="mb-4 flex flex-wrap gap-x-6 gap-y-2"><Stat n={money(billed)} l="Billed" /><Stat n={money(paid)} l="Paid" /><Stat n={money(billed-paid)} l="Payable" tone={billed-paid>0?"red":undefined} /><Stat n={money(overdue)} l="Overdue" tone={overdue>0?"red":undefined} /></div>
                {showAddBill && (
                  <div className="mb-4 rounded-lg border border-zinc-300 bg-white p-3">
                    <div className="grid grid-cols-2 gap-2 sm:grid-cols-3">
                      <div className="col-span-2 sm:col-span-1"><Lbl>Project</Lbl><Select value={nbill.projectId} onChange={v=>setNbill({...nbill,projectId:v})} options={[{value:"",label:"Select project…"},...projOpts]} className="w-full" /></div>
                      <div><Lbl>Vendor</Lbl><Select value={nbill.vendorId} onChange={v=>setNbill({...nbill,vendorId:v})} options={vendOpts} className="w-full" /></div>
                      <div><Lbl>Category</Lbl><Select value={nbill.category} onChange={v=>setNbill({...nbill,category:v})} options={CON_CATS.map(c=>({value:c,label:c}))} className="w-full" /></div>
                      <div><Lbl>Description</Lbl><Input value={nbill.title} onChange={e=>setNbill({...nbill,title:e.target.value})} placeholder="Cement 50 bags…" /></div>
                      <div><Lbl>Amount (৳)</Lbl><Input value={nbill.amount} onChange={e=>setNbill({...nbill,amount:e.target.value})} /></div>
                      <div><Lbl>Bill date</Lbl><input type="date" value={nbill.date} onChange={e=>setNbill({...nbill,date:e.target.value})} className="w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" /></div>
                      <div><Lbl>Due date</Lbl><input type="date" value={nbill.dueDate} onChange={e=>setNbill({...nbill,dueDate:e.target.value})} className="w-full rounded-md border border-zinc-300 px-2 py-1.5 text-[12px] outline-none focus:border-zinc-900" /></div>
                    </div>
                    <div className="mt-3 flex gap-2"><button onClick={addBill} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Add</button><button onClick={()=>setShowAddBill(false)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600">Cancel</button></div>
                  </div>
                )}
                {groups.map(([p,its])=>{ const b=its.reduce((s,x)=>s+x.amount,0),pd=its.reduce((s,x)=>s+x.paidAmount,0); return (
                  <section key={p?p.id:"__none"} className="mb-4">
                    <div className="mb-1.5 flex flex-wrap items-baseline gap-2">
                      {p?<><span className="mono text-[12px] font-bold">{p.code}</span><span className="text-[13px] font-semibold">{p.nickname||p.client||""}</span>{p.location&&<span className="text-[11px] text-zinc-400">{p.location}</span>}</>:<span className="text-[13px] font-semibold text-zinc-500">No project</span>}
                      <span className="mono ml-auto text-[11px] text-zinc-500">billed {money(b)} · paid {money(pd)} · <span className={b-pd>0?"font-semibold text-red-500":"font-semibold text-emerald-600"}>owe {money(b-pd)}</span></span>
                    </div>
                    <div className="space-y-1.5">{its.map(billRow)}</div>
                  </section>
                ); })}
                {!bills.length && <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-10 text-center text-[12px] text-zinc-400">No bills yet. Add a vendor bill or purchase to track construction spend per project.</div>}
              </>); })()}
              {conTab==="vendors" && (()=>{ return (<>
                <div className="mb-3 flex flex-wrap items-center justify-between gap-2">
                  <h2 className="text-base font-semibold">Vendors <span className="mono text-[11px] text-zinc-400">{vendors.length}</span></h2>
                  <button onClick={()=>setShowAddVendor(s=>!s)} className="rounded-md bg-zinc-900 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-zinc-700">+ Add vendor</button>
                </div>
                {showAddVendor && (
                  <div className="mb-4 rounded-lg border border-zinc-300 bg-white p-3">
                    <div className="grid grid-cols-2 gap-2 sm:grid-cols-4">
                      <div><Lbl>Name</Lbl><Input value={nvend.name} onChange={e=>setNvend({...nvend,name:e.target.value})} /></div>
                      <div><Lbl>Type</Lbl><Select value={nvend.type} onChange={v=>setNvend({...nvend,type:v})} options={VENDOR_TYPES.map(t=>({value:t,label:t}))} className="w-full" /></div>
                      <div><Lbl>Phone</Lbl><Input value={nvend.phone} onChange={e=>setNvend({...nvend,phone:e.target.value})} /></div>
                      <div><Lbl>Note</Lbl><Input value={nvend.note} onChange={e=>setNvend({...nvend,note:e.target.value})} /></div>
                    </div>
                    <div className="mt-3 flex gap-2"><button onClick={addVendor} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Add</button><button onClick={()=>setShowAddVendor(false)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600">Cancel</button></div>
                  </div>
                )}
                <div className="space-y-1.5">{vendors.map(v=>{ const ed=vendorEdit&&vendorEdit.id===v.id; const vTotal=bills.filter(b=>b.vendorId===v.id).reduce((s,b)=>s+b.amount,0); const vOwe=bills.filter(b=>b.vendorId===v.id).reduce((s,b)=>s+(b.amount-b.paidAmount),0); return (
                  <div key={v.id} className="rounded-lg border border-zinc-200 bg-white">
                    <div className="flex items-center gap-2 px-3 py-2">
                      <button onClick={()=>setVendorEdit(ed?null:{...v})} className="flex min-w-0 flex-1 items-center gap-2 text-left">
                        <span className="text-[11px] text-zinc-400">{ed?"▾":"▸"}</span>
                        <span className="text-[13px] font-medium">{v.name}</span>
                        {v.type&&<span className="shrink-0 rounded bg-zinc-100 px-1.5 py-0.5 text-[10px] text-zinc-500">{v.type}</span>}
                        {v.phone&&<span className="mono hidden text-[11px] text-zinc-400 sm:inline">{v.phone}</span>}
                      </button>
                      {vTotal>0&&<span className="mono text-[11px] text-zinc-500">billed {money(vTotal)}{vOwe>0&&<span className="text-red-500"> · owe {money(vOwe)}</span>}</span>}
                    </div>
                    {ed && <div className="border-t border-zinc-100 p-3">
                      <div className="grid grid-cols-2 gap-2 sm:grid-cols-4">
                        <div><Lbl>Name</Lbl><Input value={vendorEdit.name} onChange={e=>setVendorEdit({...vendorEdit,name:e.target.value})} /></div>
                        <div><Lbl>Type</Lbl><Select value={vendorEdit.type} onChange={v2=>setVendorEdit({...vendorEdit,type:v2})} options={VENDOR_TYPES.map(t=>({value:t,label:t}))} className="w-full" /></div>
                        <div><Lbl>Phone</Lbl><Input value={vendorEdit.phone} onChange={e=>setVendorEdit({...vendorEdit,phone:e.target.value})} /></div>
                        <div><Lbl>Note</Lbl><Input value={vendorEdit.note} onChange={e=>setVendorEdit({...vendorEdit,note:e.target.value})} /></div>
                      </div>
                      <div className="mt-3 flex flex-wrap items-center gap-2">
                        <button onClick={saveVendor} className="rounded-md bg-zinc-700 px-3 py-1.5 text-[12px] font-medium text-white">Save</button>
                        <button onClick={()=>setVendorEdit(null)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600">Cancel</button>
                        <button onClick={()=>deleteVendor(v.id)} className="ml-auto rounded-md border border-zinc-200 px-3 py-1.5 text-[11px] text-zinc-400 hover:border-red-300 hover:text-red-500">Delete</button>
                      </div>
                    </div>}
                  </div>
                ); })}</div>
                {!vendors.length && <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-10 text-center text-[12px] text-zinc-400">No vendors yet. Add suppliers and contractors here, then attach them to bills.</div>}
              </>); })()}
            </>)}

            {["hr","marketing"].includes(area) && (()=>{ const lbl=(ALL_KEYS.find(([k])=>k===area)||[])[1]||area; return (
              <div className="rounded-xl border border-dashed border-zinc-300 bg-white p-10 text-center">
                <div className="text-base font-semibold text-zinc-700">{lbl} — coming soon</div>
                <p className="mx-auto mt-2 max-w-md text-[12px] leading-relaxed text-zinc-400">This area exists and is access-controlled — only people you give the <b>{lbl}</b> key can open it, and its data will be invisible to everyone else. We'll build its tools in an upcoming step.</p>
              </div>
            ); })()}
          </main>
          <footer className="mx-auto max-w-[1100px] px-4 pb-8 pt-2 sm:px-8">
            {showSeen && <div className="mb-3 rounded-lg border border-zinc-200 bg-white p-3"><div className="mb-1.5 mono text-[10px] uppercase tracking-wider text-zinc-400">Team — last seen</div><div className="space-y-0.5">{allProfiles.slice().sort((a,b)=>(b.last_seen?new Date(b.last_seen).getTime():0)-(a.last_seen?new Date(a.last_seen).getTime():0)).map(pr=>(<div key={pr.id} className="flex items-center gap-2 text-[11px]"><span className="min-w-0 flex-1 truncate text-zinc-600">{pr.name||pr.employee_id}{pr.id===profile?.id&&<span className="text-zinc-400"> (you)</span>}</span><span className="mono shrink-0 text-zinc-400">{pr.last_seen?relTime(pr.last_seen):"never"}</span></div>))}</div></div>}
            <div className="flex flex-wrap items-center justify-between gap-2 border-t border-zinc-200 pt-4 text-[11px] text-zinc-400">
              <span>{profile?.companies?.name||"Studio 16 Architects"}{profile?.companies?.website?" · "+profile.companies.website:""}</span>
              {(()=>{ const others=allProfiles.filter(p=>p.id!==profile?.id&&p.last_seen).sort((a,b)=>new Date(b.last_seen)-new Date(a.last_seen)); const last=others[0]; return <button onClick={()=>setShowSeen(s=>!s)} className="mono hover:text-zinc-700">{last?`Last opened by ${last.name||last.employee_id} · ${relTime(last.last_seen)}`:"Team activity"} {showSeen?"▾":"▸"}</button>; })()}
              <span className="mono">{new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</span>
            </div>
          </footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
