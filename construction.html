      function buildShare(m){ if(!m) return ""; const act=t=>t.assignee===m.id&&(t.status==="ongoing"||t.status==="pending"); const mp=projects.filter(p=>p.tasks.some(act)).sort((a,b)=>PRIORITY[a.priority].rank-PRIORITY[b.priority].rank); const out=[m.name]; mp.forEach((p,pi)=>{ out.push((pi+1)+". "+projText(p)); p.tasks.filter(act).forEach((t,ti)=>{ const L=String.fromCharCode(65+ti); const c=t.workType==="coordination"&&t.contact?" -> "+t.contact:""; const tag=t.workType==="coordination"?"(follow-up "+t.status+")":"("+t.status+")"; out.push("     "+L+". "+t.label+c+" "+tag); }); }); if(!mp.length) out.push("No ongoing or pending tasks."); return out.join("\n"); }

      function buildBoardShare(){ const live=projects.filter(p=>p.status==="live"); const out=[(profile?.companies?.name||"Studio 16")+" — Live Projects ("+today()+")"]; ["top","medium","low"].forEach(lvl=>{ const rows=live.filter(p=>p.priority===lvl).sort((a,b)=>a.sort-b.sort); if(!rows.length) return; out.push(""); out.push("● "+PRIORITY[lvl].label.toUpperCase()+" PRIORITY"); rows.forEach((p,i)=>{ const lead=byId(p.lead); out.push((i+1)+". "+projText(p)+(lead?" — "+lead.name:" — (no lead)")); const ts=p.tasks.filter(t=>t.status==="ongoing"||t.status==="pending").sort((a,b)=>a.sort-b.sort); if(!ts.length){ out.push("     (nothing ongoing/pending)"); } else { ts.forEach(t=>{ const who=byId(t.assignee); const c=t.workType==="coordination"&&t.contact?" -> "+t.contact:""; const mark=t.status==="ongoing"?"►":"!"; out.push("     "+mark+" "+t.label+c+" ("+t.status+(who?", "+who.name.split(" ")[0]:"")+")"); }); } }); }); if(out.length===1) out.push("No live projects."); return out.join("\n"); }

      function printBoard(){ const c=profile?.companies||{}; const live=projects.filter(p=>p.status==="live"); const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); const taskLine=t=>{ const who=byId(t.assignee); const c2=t.workType==="coordination"&&t.contact?" → "+esc(t.contact):""; return "<div class='tk "+t.status+"'><span class='dot "+t.workType+"'></span><span class='tl'>"+esc(t.label)+c2+"</span><span class='ts'>"+t.status+(who?" · "+esc(who.name.split(' ')[0]):"")+"</span></div>"; }; const taskBlock=p=>{ const open=p.tasks.filter(t=>t.status==="ongoing"||t.status==="pending"||(printUpcoming&&t.status==="upcoming")).sort((a,b)=>a.sort-b.sort); const prod=open.filter(t=>t.workType==="production"); const fol=open.filter(t=>t.workType==="coordination"); if(!open.length) return "<div class='none'>No open tasks</div>"; let h=""; if(prod.length) h+="<div class='grp'>Production</div>"+prod.map(taskLine).join(""); if(fol.length) h+="<div class='grp'>Follow-up</div>"+fol.map(taskLine).join(""); return h; }; const sec=["top","medium","low"].map(lvl=>{ const rows=live.filter(p=>p.priority===lvl).sort((a,b)=>a.sort-b.sort); if(!rows.length) return ""; const blocks=rows.map((p,i)=>{ const lead=byId(p.lead); return "<div class='pj'><div class='ph'><span class='pc'>"+esc(p.code)+"</span><span class='pn'>"+esc((p.nickname||p.client||"")+(p.location?" · "+p.location:""))+"</span><span class='pl'>"+(lead?esc(lead.name):"<span class=u>Unassigned</span>")+"</span></div>"+taskBlock(p)+"</div>"; }).join(""); return "<h2 class='"+lvl+"'>"+PRIORITY[lvl].label+" priority <span>"+rows.length+"</span></h2>"+blocks; }).join(""); const html="<!doctype html><html><head><meta charset='utf-8'><title>Live Projects — "+esc(c.name||"Studio 16")+"</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Archivo,Arial,sans-serif;color:#18181b;padding:38px 44px}.hd{display:flex;align-items:flex-start;justify-content:space-between;border-bottom:2px solid #18181b;padding-bottom:14px}.hd img{height:42px}.hd .co{text-align:right;font-size:10px;color:#52525b;line-height:1.5}.ttl{margin:22px 0 4px;font-size:19px;font-weight:700}.sub{font-size:11px;color:#71717a;margin-bottom:14px}h2{font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px;color:#18181b}h2 span{color:#a1a1aa;font-weight:500;margin-left:4px}h2.top{color:#dc2626}h2.medium{color:#d97706}.pj{border:1px solid #e4e4e7;border-radius:7px;padding:9px 11px;margin-bottom:8px;page-break-inside:avoid}.ph{display:flex;align-items:baseline;gap:8px;margin-bottom:5px}.pc{font-family:'Spline Sans Mono',monospace;font-weight:600;font-size:13px}.pn{font-size:13px;flex:1}.pl{font-size:10px;color:#71717a}.grp{font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#a1a1aa;margin:5px 0 2px}.tk{display:flex;align-items:center;gap:6px;font-size:11px;padding:2px 0}.tk .tl{flex:1}.tk .ts{font-family:'Spline Sans Mono',monospace;font-size:9px;color:#a1a1aa;text-transform:uppercase}.tk.ongoing .tl{font-weight:700}.tk.pending .tl{font-weight:600;color:#b45309}.dot{width:6px;height:6px;border-radius:50%;flex:none}.dot.production{background:#3f3f46}.dot.coordination{background:#f59e0b}.none{font-size:10px;color:#a1a1aa;font-style:italic}.u{color:#dc2626}.ft{margin-top:28px;border-top:1px solid #d4d4d8;padding-top:8px;font-size:9px;color:#a1a1aa;display:flex;justify-content:space-between}@media print{body{padding:0}}</style></head><body><div class='hd'><img src='data:image/svg+xml;base64,"+LOGO_B64+"' alt='logo'/><div class='co'><b>"+esc(c.name||"Studio 16 Architects")+"</b><br>"+esc(c.address||"")+"<br>"+esc(c.email||"")+(c.website?" · "+esc(c.website):"")+"</div></div><div class='ttl'>Live Projects</div><div class='sub'>"+live.length+" live · generated "+today()+"</div>"+(sec||"<p style='color:#a1a1aa;font-size:12px'>No live projects.</p>")+"<div class='ft'><span>"+esc(c.name||"Studio 16 Architects")+"</span><span>"+esc(c.website||"")+"</span></div></body></html>"; const w=window.open("","_blank"); if(!w){ setErr("Allow pop-ups for this site to print."); return; } w.document.write(html); w.document.close(); w.focus(); setTimeout(()=>{ try{w.print();}catch(e){} },450); }

      function taskRow(t,arr){ const i=arr.indexOf(t); const cls=t.working?"border-emerald-400 bg-emerald-50 ring-1 ring-emerald-300":(t.status==="ongoing"?"border-zinc-300 bg-white shadow-sm":t.status==="pending"?"border-amber-200 bg-amber-50/40":"border-zinc-100 bg-zinc-50"); return (

g(str||"").split(/\*\*(.+?)\*\*/).map((t,i)=>i%2?<strong key={i}>{t}</strong>:t); const setTermBody=(id,body)=>setF("terms",(e.terms||[]).map(x=>x.id===id?{...x,body}:x)); return (<div className="space-y-3">

                      <button onClick={submitEmployee} className="rounded-md bg-zinc-900 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-zinc-700">{hrEditId?"Save changes":"Add member"}</button>
                      <button onClick={()=>setHrOpen(false)} className="rounded-md border border-zinc-300 px-3 py-1.5 text-[12px] text-zinc-600 hover:bg-zinc-50">Cancel</button>
                      {hrEditId && isAdmin && !hrArch && <button onClick={async()=>{ const m=members.find(x=>x.id===hrEditId); if(m){ await removeEmployee(m); } setHrOpen(false); }} className="ml-auto rounded-md border border-zinc-200 px-3 py-1.5 text-[11px] text-zinc-400 hover:border-red-300 hover:text-red-500">Remove member</button>}
                    </div>
                  </div>)}
                  <div className="flex flex-wrap items-center gap-2 pt-3 mb-4">
                    <div className="flex items-center gap-1">{[["position","Position"],["department","Department"],["type","Type"],["none","None"]].map(([k,l])=>(<button key={k} onClick={()=>setHrGroup(k)} className={`rounded-md px-3 py-1.5 text-[12px] font-medium ${hrGroup===k?"bg-zinc-900 text-white":"text-zinc-500 hover:bg-zinc-100"}`}>{l}</button>))}</div>
                    <div className="ml-auto flex items-center gap-2"><div className="flex items-center rounded-md border border-zinc-200 bg-white p-0.5">{[["active","Active"],["archived","Archived"]].map(([k,l])=>(<button key={k} onClick={()=>setHrArch(k==="archived")} className={`rounded px-2.5 py-1 text-[11px] font-medium ${(hrArch?"archived":"active")===k?"bg-zinc-900 text-white":"text-zinc-500 hover:bg-zinc-50"}`}>{l}</button>))}</div>{isAdmin && <button onClick={()=>{setHrForm(blankHr());setHrEditId(null);setHrOpen(true);}} className="rounded-md bg-zinc-900 px-3 py-1.5 text-[12px] font-medium text-white hover:bg-zinc-700">+ Add team member</button>}</div>
                  </div>
                  {emps.length===0 ? <div className="rounded-lg border border-dashed border-zinc-300 bg-white py-10 text-center text-[12px] text-zinc-400">{hrArch?"No archived members.":"No team members yet."}</div> : (()=>{
                    const card=(m)=>{ const pal=roleColor(m.role); return (
                      <div key={m.id} className="rounded-lg border border-zinc-200 bg-white p-3 shadow-sm hover:border-zinc-400">
                        <button onClick={()=>setHrProfile(m.id)} className="block w-full text-left">
                          <div className="flex items-center gap-2"><span className={"mono flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-[11px] font-semibold "+pal.bg+" "+pal.text}>{initials(m.name)}</span><span className="min-w-0 flex-1"><span className="block truncate text-[13px] font-semibold leading-tight text-zinc-800">{m.name}</span><span className="mono block truncate text-[9px] text-zinc-400">{canon(m.role,POSITIONS)||""}{m.empCode?(" · "+m.empCode):""}</span></span></div>
                          <div className="mt-2 flex items-center justify-between gap-2">{m.employmentType==="contract"?<span className="rounded-full border border-sky-200 bg-sky-50 px-2 py-0.5 text-[10px] text-sky-700">Contract</span>:<span className="rounded-full border border-zinc-200 bg-zinc-50 px-2 py-0.5 text-[10px] text-zinc-600">Salaried</span>}{m.paySource==="site"&&<span className="ml-1 rounded-full border border-amber-200 bg-amber-50 px-2 py-0.5 text-[11px] text-amber-700">Site-paid</span>}{m.employmentType!=="contract"&&Number(m.monthlySalary||0)>0&&<span className="mono text-[11px] font-semibold text-zinc-700">{money(m.monthlySalary)}</span>}</div>
                        </button>
                        {isAdmin && <div className="mt-2 flex items-center gap-3 border-t border-zinc-100 pt-2 text-[11px]">{hrArch ? <button onClick={()=>restoreEmployee(m)} className="text-emerald-600 hover:underline">Restore</button> : <button onClick={()=>{setHrForm({name:m.name||"",code:m.empCode||"",role:canon(m.role,POSITIONS),type:m.employmentType==="contract"?"contract":"salaried",salary:m.monthlySalary||"",join:m.joinDate||"",dept:canon(m.department,DEPARTMENTS)||"Design",onBoard:m.onBoard!==false,paySource:m.paySource||"office",mobile:m.mobile||"",nid:m.nid||"",emergency:m.emergency||"",address:m.address||"",blood:m.blood||"",study:m.study||"",institute:m.institute||"",district:m.district||""});setHrEditId(m.id);setHrOpen(true);}} className="text-zinc-500 hover:text-zinc-900 hover:underline">Edit</button>}</div>}
                      </div>
                    ); };
                    if(hrGroup==="none"){ return <div className="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-4">{emps.map(card)}</div>; }
                    const gk=m=> hrGroup==="department"?(canon(m.department,DEPARTMENTS)||"Unassigned") : hrGroup==="type"?(m.employmentType==="contract"?"Contract":"Salaried") : (canon(m.role,POSITIONS)||"Unassigned");
                    const order= hrGroup==="department"?DEPARTMENTS : hrGroup==="type"?["Salaried","Contract"] : POSITIONS;
                    const groups={}; emps.forEach(m=>{const k=gk(m); (groups[k]=groups[k]||[]).push(m);});
                    const keys=Object.keys(groups).sort((a,b)=>{const ia=order.indexOf(a),ib=order.indexOf(b); return ((ia<0?999:ia)-(ib<0?999:ib))||(a<b?-1:1);});
                    return keys.map(k=>(<section key={k} className="mb-4"><div className="mb-2 flex items-center gap-2"><h3 className="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">{k}</h3><span className="mono text-[10px] text-zinc-400">{groups[k].length}</span><div className="ml-1 h-px flex-1 bg-zinc-200" /></div><div className="grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-4">{groups[k].map(card)}</div></section>));
                  })()}
                  <div className="mt-3 text-[11px] text-zinc-400">Salaried people flow into the monthly run automatically. Contract people (paid per project) don't — they're paid only when you log a project cost against them.</div>
                </>)}</>);
              })()}
              
{area==="marketing" && (()=>{ const lbl=(ALL_KEYS.find(([k])=>k===area)||[])[1]||area; return (
              <div className="rounded-xl border border-dashed border-zinc-300 bg-white p-10 text-center">
                <div className="text-base font-semibold text-zinc-700">{lbl} — coming soon</div>
                <p className="mx-auto mt-2 max-w-md text-[12px] leading-relaxed text-zinc-400">This area exists and is access-controlled — only people you give the <b>{lbl}</b> key can open it, and its data will be invisible to everyone else. We'll build its tools in an upcoming step.</p>
              </div>
            ); })()}
          </main>
          <footer className="mx-auto max-w-[1100px] px-4 pb-8 pt-2 sm:px-8">
            {showSeen && <div className="mb-3 rounded-lg border border-zinc-200 bg-white p-3"><div className="mb-1.5 mono text-[10px] uppercase tracking-wider text-zinc-400">Team — last seen</div><div className="space-y-0.5">{allProfiles.slice().sort((a,b)=>(b.last_seen?new Date(b.last_seen).getTime():0)-(a.last_seen?new Date(a.last_seen).getTime():0)).map(pr=>(<div key={pr.id} className="flex items-center gap-2 text-[11px]"><span className="min-w-0 flex-1 truncate text-zinc-600">{pr.name||pr.employee_id}{pr.id===profile?.id&&<span className="text-zinc-400"> (you)</span>}</span><span className="mono shrink-0 text-zinc-400">{pr.last_seen?relTime(pr.last_seen):"never"}</span></div>))}</div></div>}
            <div className="flex flex-wrap items-center justify-between gap-2 border-t border-zinc-200 pt-4 text-[11px] text-zinc-400">
              <span>{profile?.companies?.name||"Studio 16 Architects"}{profile?.companies?.website?" · "+profile.companies.website:""}</span>
              {(()=>{ const others=allProfiles.filter(p=>p.id!==profile?.id&&p.last_seen).sort((a,b)=>new Date(b.last_seen)-new Date(a.last_seen)); const last=others[0]; return <button onClick={()=>setShowSeen(s=>!s)} className="mono hover:text-zinc-700">{last?`Last opened by ${last.name||last.employee_id} · ${relTime(last.last_seen)}`:"Team activity"} {showSeen?"▾":"▸"}</button>; })()}
              <span className="mono">{new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}</span>
            </div>
          </footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
